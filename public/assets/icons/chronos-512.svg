<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fondo -->
  <rect width="512" height="512" fill="#0a0e14" rx="120"/>
  
  <!-- Círculo principal azul (Chronos - tiempo) -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#58a6ff" stroke-width="20"/>
  
  <!-- Manecilla de hora (diagonal) -->
  <line x1="256" y1="256" x2="256" y2="100" stroke="#58a6ff" stroke-width="16" stroke-linecap="round"/>
  
  <!-- Manecilla de minuto (más larga) -->
  <line x1="256" y1="256" x2="340" y2="256" stroke="#3fb950" stroke-width="16" stroke-linecap="round"/>
  
  <!-- Punto central -->
  <circle cx="256" cy="256" r="20" fill="#58a6ff"/>
  
  <!-- Balón de fútbol -->
  <circle cx="380" cy="390" r="45" fill="#f0883e" stroke="#ff6b35" stroke-width="4"/>
  
  <!-- Hexágonos del balón (patrón) -->
  <g stroke="#ff6b35" stroke-width="2" fill="none" opacity="0.8">
    <polygon points="380,360 390,368 390,385 380,393 370,385 370,368"/>
    <polygon points="410,375 420,383 420,400 410,408 400,400 400,383"/>
    <polygon points="350,375 360,383 360,400 350,408 340,400 340,383"/>
  </g>
  
  <!-- Marca de tiempo -->
  <text x="256" y="460" font-size="50" font-weight="bold" fill="#58a6ff" text-anchor="middle">⚽</text>
</svg>
