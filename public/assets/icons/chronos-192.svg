<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Fondo -->
  <rect width="192" height="192" fill="#0a0e14" rx="45"/>
  
  <!-- Círculo principal azul (Chronos - tiempo) -->
  <circle cx="96" cy="96" r="70" fill="none" stroke="#58a6ff" stroke-width="8"/>
  
  <!-- Manecilla de hora (diagonal) -->
  <line x1="96" y1="96" x2="96" y2="40" stroke="#58a6ff" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Manecilla de minuto (más larga) -->
  <line x1="96" y1="96" x2="130" y2="96" stroke="#3fb950" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Punto central -->
  <circle cx="96" cy="96" r="8" fill="#58a6ff"/>
  
  <!-- Balón de fútbol -->
  <circle cx="142" cy="150" r="18" fill="#f0883e" stroke="#ff6b35" stroke-width="2"/>
  
  <!-- Hexágonos del balón (patrón) -->
  <g stroke="#ff6b35" stroke-width="1" fill="none" opacity="0.8">
    <polygon points="142,135 147,138 147,144 142,147 137,144 137,138"/>
    <polygon points="150,142 155,145 155,151 150,154 145,151 145,145"/>
    <polygon points="134,142 139,145 139,151 134,154 129,151 129,145"/>
  </g>
  
  <!-- Marca de tiempo ("⏱️" en forma abstracta) -->
  <text x="96" y="180" font-size="20" font-weight="bold" fill="#58a6ff" text-anchor="middle">⚽</text>
</svg>
