    <!-- EmailJS SDK para envío automático de informes -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

        window._emailjsReady = false;
    </script>

    <!-- ══════════════════════════════════════════════
         FIREBASE SDK
    ══════════════════════════════════════════════ -->
    <script type="module">
        import { initializeApp }
            from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword,
                 signInWithEmailAndPassword, onAuthStateChanged, signOut,
                 setPersistence, browserLocalPersistence, browserSessionPersistence }
            from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, serverTimestamp }
            from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey:            "AIzaSyAWPw-lE6ynYK1CkFpSbwCgRtitDzBpIb4",
            authDomain:        "cronos-futbol-app.firebaseapp.com",
            projectId:         "cronos-futbol-app",
            storageBucket:     "cronos-futbol-app.firebasestorage.app",
            messagingSenderId: "393110572633",
            appId:             "1:393110572633:web:27a7effed60975e690ab48",
            measurementId:     "G-WP3921EM1Z"
        };

        const app  = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db   = getFirestore(app);

        async function checkAuthorization(user) {
            try {
                const ref  = doc(db, 'users', user.uid);
                const snap = await getDoc(ref);

                if (!snap.exists()) {
                    await setDoc(ref, {
                        email:        user.email,
                        isAuthorized: false,
                        role:         'user',
                        createdAt:    serverTimestamp(),
                        lastLogin:    serverTimestamp()
                    });
                    showAuthError('Cuenta creada. Pendiente de autorización por el administrador.');
                    await signOut(auth);
                    return;
                }

                await setDoc(ref, { lastLogin: serverTimestamp() }, { merge: true });
            } catch (err) {
                console.error("Firebase init error:", err);
            }
        }
        
        window.__internalCheckAuthorization = checkAuthorization;
        setPersistence(auth, browserLocalPersistence).catch(() => {});

        window._cronos_auth = {
            auth, db, signOut,
            createUserWithEmailAndPassword, signInWithEmailAndPassword,
            doc, getDoc, setDoc, serverTimestamp, checkAuthorization
        };

        onAuthStateChanged(auth, async (user) => {
            if (window._cronosCurrentUser) return;
            if (user) {
                if (window._checkAuthorization) {
                    await window._checkAuthorization(user);
                } else {
                    setTimeout(() => { if(window._checkAuthorization) window._checkAuthorization(user); }, 500);
                }
            } else {
                if (typeof showScreen === 'function') showScreen('auth-screen');
            }
        });
    </script>

    <!-- ══════════════════════════════════════════════

</head>
