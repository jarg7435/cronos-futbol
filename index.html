<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cronos Fútbol - Coach Assistant</title>
    <link rel="stylesheet" href="style.css?v=7.0">
    <link rel="manifest" href="manifest.json?v=7.0">
    <meta name="theme-color" content="#0a0e14">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Outfit:wght@600&display=swap"
        rel="stylesheet">

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script type="text/javascript">
        window._emailjsReady = false;
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAWPw-lE6ynYK1CkFpSbwCgRtitDzBpIb4",
            authDomain: "cronos-futbol-app.firebaseapp.com",
            projectId: "cronos-futbol-app",
            storageBucket: "cronos-futbol-app.firebasestorage.app",
            messagingSenderId: "393110572633",
            appId: "1:393110572633:web:27a7effed60975e690ab48",
            measurementId: "G-WP3921EM1Z"
        };

        const app = initializeApp(firebaseConfig);
        window.firebaseAuth = getAuth(app);
        window.firebaseDb = getFirestore(app);
    </script>
</head>

<body class="locked" onload="detectDeviceAndShowInstall()">

    <div id="install-screen" class="full-overlay">
        <div class="onboarding-container">
            <div id="ob-content"></div>
            <div class="ob-dots" id="ob-dots"></div>
            <div class="ob-footer">
                <button class="btn" id="ob-prev" onclick="obPrev()">Atrás</button>
                <button class="btn primary" id="ob-next" onclick="obNext()">Siguiente</button>
            </div>
        </div>
    </div>

    <div id="auth-screen" class="full-overlay" style="display: none;">
        <div class="access-card">
            <h1 style="font-family: 'Outfit', sans-serif; color: var(--primary); margin-bottom: 0.5rem;">CRONOS FÚTBOL</h1>
            <p id="auth-subtitle" style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1.5rem;">Iniciar Sesión</p>

            <div class="form-group" style="margin-bottom: 1rem;">
                <input type="email" id="auth-email" placeholder="Correo electrónico" style="width: 100%; text-align: center; font-size: 1rem; padding: 0.8rem;">
            </div>
            
            <div class="form-group" style="margin-bottom: 0.8rem; position: relative;">
                <input type="password" id="auth-password" placeholder="Contraseña" style="width: 100%; text-align: center; font-size: 1rem; padding: 0.8rem;">
                <span id="toggle-password" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 1.2rem;">👁️</span>
            </div>

            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; font-size: 0.8rem; color: var(--text-muted); padding: 0 5px;">
                <label style="display: flex; align-items: center; cursor: pointer;">
                    <input type="checkbox" id="remember-me" style="margin-right: 5px;"> Recordarme
                </label>
                <span onclick="window.handleForgotPassword()" style="text-decoration: underline; cursor: pointer;">Olvidé mi contraseña</span>
            </div>

            <button class="btn primary" id="auth-action-btn" onclick="handleAuthAction()" style="width: 100%; margin-bottom: 1rem;">ENTRAR</button>
            <p id="access-error" style="color: var(--danger); font-size: 0.8rem; min-height: 1.2rem; margin-bottom: 1rem;"></p>
            
            <p style="color: var(--text-muted); font-size: 0.8rem; cursor: pointer; text-decoration: underline;" onclick="toggleAuthMode()" id="auth-toggle-link">
                ¿No tienes cuenta? Regístrate
            </p>
        </div>
    </div>

    <header id="main-header" style="display: none;">
        <div class="logo">
            <h1 style="font-family: 'Outfit', sans-serif; color: var(--primary);">CRONOS<br>FÚTBOL</h1>
            <span style="font-size: 0.6rem; color: var(--text-muted); display: block; margin-top: -5px;">v7.0</span>
        </div>
        <div class="master-clock-container">
            <div class="dual-timers">
                <div class="timer-block active" id="timer-h1-container" onclick="editTimer(1)">
                    <span class="timer-label">1ª P</span>
                    <span id="timer-h1" class="timer-val">30:00</span>
                </div>
                <div class="timer-block" id="timer-h2-container" onclick="editTimer(2)">
                    <span class="timer-label">2ª P</span>
                    <span id="timer-h2" class="timer-val">30:00</span>
                </div>
            </div>
            <div id="match-phase-label" style="font-size: 0.6rem; color: white; text-align: center; margin-top: 2px;">1ª PARTE</div>
        </div>
        <div class="header-actions">
            <button id="btn-back-setup" class="btn" onclick="goBackToSetup()">← INICIO</button>
            <button id="btn-play-pause" class="btn primary">EMPEZAR</button>
            <button id="btn-admin" class="btn" style="display:none; background:#ff9800; color:#000;" onclick="window.fetchUsers(); document.getElementById('admin-dashboard').style.display='flex';">⚙️ ADMIN</button>
            <button id="btn-reset" class="btn danger">REINICIAR</button>
            <button id="btn-save-team" class="btn">GUARDAR</button>
            <button id="btn-export" class="btn">REPORTAR</button>
        </div>
    </header>

    <main class="main-container" id="main-container" style="display: none;">
        <aside class="sidebar">
            <div class="config-section">
                <h3 id="label-home-name">LOCAL</h3>
                <div id="sub-status" style="font-size: 0.6rem; color: var(--success);">Plan: FREE</div>
            </div>
            <div class="bench-section">
                <h3>BANQUILLO</h3>
                <div id="bench-list" class="bench-container"></div>
            </div>
        </aside>

        <main class="field-area">
            <div class="pitch" id="football-pitch">
                <div class="center-circle"></div>
                <div class="penalty-area left"></div>
                <div class="penalty-area right"></div>
            </div>
        </main>

        <aside class="sidebar-right">
            <div class="config-section">
                <h3 id="label-away-name">VISITANTE</h3>
            </div>
            <div class="bench-section">
                <h3>BANQUILLO</h3>
                <div id="bench-list-away" class="bench-container"></div>
            </div>
        </aside>
    </main>

    <section id="admin-dashboard" class="modal" style="display:none; z-index: 9999;">
        <div class="modal-content" style="width: 90%; max-width: 800px; background: #1a1a1a;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                <h2 style="color: var(--primary);">Gestión de Usuarios</h2>
                <button class="btn danger" onclick="document.getElementById('admin-dashboard').style.display='none';">Cerrar</button>
            </div>
            <div style="max-height: 60vh; overflow-y: auto;">
                <table style="width: 100%; color: white; text-align: left;">
                    <thead>
                        <tr style="border-bottom: 1px solid #333;">
                            <th>Email</th>
                            <th>Plan</th>
                            <th>Acceso</th>
                        </tr>
                    </thead>
                    <tbody id="admin-user-list"></tbody>
                </table>
            </div>
        </div>
    </section>

    <div id="setup-modal" class="modal"></div>

    <script type="module" src="auth.js?v=7.0"></script>
    <script src="app.js?v=7.0"></script>

    <script>
        // --- LÓGICA DE ONBOARDING ---
        const OB_STEPS = [
            { title: "Bienvenido a Cronos", desc: "La herramienta definitiva para entrenadores.", img: "⚽" },
            { title: "Control Total", desc: "Gestiona cambios y tiempos de juego en tiempo real.", img: "⏱️" },
            { title: "Informes Pro", desc: "Envía estadísticas por WhatsApp y Email al instante.", img: "📊" }
        ];
        let obCurrentStep = 0;

        function obRender() {
            const step = OB_STEPS[obCurrentStep];
            document.getElementById('ob-content').innerHTML = `
                <div style="font-size: 4rem; margin-bottom: 1rem;">${step.img}</div>
                <h2>${step.title}</h2>
                <p style="color: var(--text-muted);">${step.desc}</p>
            `;
            const dots = document.getElementById('ob-dots');
            dots.innerHTML = OB_STEPS.map((_, i) => `<div class="dot ${i === obCurrentStep ? 'active' : ''}"></div>`).join('');
            document.getElementById('ob-prev').style.visibility = obCurrentStep === 0 ? 'hidden' : 'visible';
            document.getElementById('ob-next').textContent = obCurrentStep === OB_STEPS.length - 1 ? 'Empezar' : 'Siguiente';
        }

        function obNext() {
            if (obCurrentStep >= OB_STEPS.length - 1) {
                localStorage.setItem('cronos_install_shown', Date.now());
                goToAuth();
            } else {
                obCurrentStep++;
                obRender();
            }
        }

        function obPrev() { if (obCurrentStep > 0) { obCurrentStep--; obRender(); } }

        function goToAuth() {
            document.getElementById('install-screen').style.display = 'none';
            document.getElementById('auth-screen').style.display = 'flex';
        }

        function detectDeviceAndShowInstall() {
            const lastShown = localStorage.getItem('cronos_install_shown');
            if (lastShown) {
                goToAuth();
            } else {
                obRender();
            }
        }
    </script>
</body>
</html>
