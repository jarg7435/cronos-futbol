}

// ── Load a specific match (real-time listener) ─────────────────────
window.loadMatch = function(matchId) {
    currentMatchId = matchId;
    showLoadingScreen('Conectando al partido…');

    // El listener visible RECLAMA este partido: resetea de forma SINCRONA el
    // estado de seeding/monotonia para este matchId, descartando cualquier valor
    // que el watcher de fondo (startBackgroundWatch) hubiera tocado durante la
    // ventana en que currentMatchId aun no estaba fijado. Asi el primer snapshot
    // que reciba este onSnapshot vuelve a sembrar limpio (sin avisar del estado
    // preexistente) y el listener visible queda como dueno unico de la deteccion
    // de eventos para este partido. Estos delete corren ANTES de registrar el
    // onSnapshot de abajo y, como Firestore entrega callbacks en un turno de
    // event loop posterior, ningun snapshot puede colarse entre medias.
    delete _matchSeeded[matchId];
    delete _matchLastTs[matchId];
    delete _matchPrevState[matchId];

    if (unsubscribeMatch) unsubscribeMatch();

    unsubscribeMatch = onSnapshot(
        doc(db, 'live_matches', matchId),
        (snap) => {
            if (!snap.exists()) {
                showLoadingScreen('Partido no encontrado.');
                return;
            }
            const data = snap.data();
            lastSnapshot = data;
            detectAndAlert(matchId, data, snap.metadata && snap.metadata.fromCache);
            renderMatch(data);
        },
        (err) => {
            showLoadingScreen('Error al conectar: ' + err.message);
        }
    );
};

// ── Render match data ──────────────────────────────────────────────
function renderMatch(data) {
    // Show match UI
    document.getElementById('loading-screen').style.display  = 'none';
    document.getElementById('scoreboard').style.display      = 'flex';
    document.getElementById('live-main').style.display       = 'flex';
    document.getElementById('history-view').style.display    = 'none';

    const isLive = data.status === 'active';

    // Badge
    document.getElementById('badge-text').textContent   = isLive ? 'EN VIVO' : 'FINALIZADO';
    document.getElementById('live-dot').style.display   = isLive ? 'block' : 'none';
    document.getElementById('last-update').textContent  =
        data.updatedAt?.toDate
            ? '↻ ' + data.updatedAt.toDate().toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit', second:'2-digit'})
            : '';

    // Scoreboard
    document.getElementById('sb-home-name').textContent  = data.homeTeam?.name  || 'LOCAL';
    document.getElementById('sb-away-name').textContent  = data.awayTeam?.name  || 'VISITANTE';
    document.getElementById('sb-home-score').textContent = data.homeTeam?.score ?? 0;
    document.getElementById('sb-away-score').textContent = data.awayTeam?.score ?? 0;
    document.getElementById('live-mode').textContent     =
        data.mode === 'f7' ? 'Fútbol 7' : 'Fútbol 11';

    // Phase label
    const phaseLabel = data.phase === '2nd_half' ? '2ª PARTE'
                     : data.phase === 'break'     ? 'DESCANSO'
                     : data.phase === 'halftime'  ? 'DESCANSO'
                     : data.phase === 'finished'  ? 'FINALIZADO'
                     : '1ª PARTE';
    document.getElementById('live-phase').textContent = phaseLabel;
    window._livePhase = data.phase || '1st_half';

    // ── TIMER — Sincronización con el servidor ─────────────────────
    // Cada snapshot de Firestore (cada ~5s) llega como un onSnapshot.
    // Guardamos la base {serverSecs, wallClock} y el intervalo de 250ms
    // añade (now - wallClock) para una cuenta continua sin saltos.
    // Cuando isRunning=false el display queda fijo en el tiempo del snapshot.

    const phase   = data.phase  || '1st_half';
    // Usar siempre las duraciones reales del snapshot (NO hardcoded)
    const defaultMaxTime = data.mode === 'f7' ? 30 * 60 : 40 * 60;
    const maxTime = phase === '2nd_half'
        ? (data.half2MaxTime || defaultMaxTime)
        : (data.half1MaxTime || defaultMaxTime);
    const timeH1  = data.timeH1 || 0;
    const timeH2  = data.timeH2 || 0;
    let serverSecs = (phase === '2nd_half') ? timeH2 : timeH1;

    // Tope de descuento por modalidad: F7 = 10 min, F11 = 15 min.
    // El partido autofinaliza la parte al alcanzar maxTime + maxAddedSecs.
    const maxAddedSecs = (data.mode === 'f7') ? 600 : 900;
    const phaseLimit   = maxTime + maxAddedSecs;

    // ── MODO AUTÓNOMO ──────────────────────────────────────────────
    // Si el snapshot trae phaseStartedAt (epoch ms del inicio de la parte),
    // el tiempo se deriva del reloj absoluto y NO depende de que el
    // entrenador siga emitiendo snapshots: funciona aunque cierre la app.
    let autonomous = false;
    if (data.isRunning && data.phaseStartedAt && (phase === '1st_half' || phase === '2nd_half')) {
        const startedMs = (typeof data.phaseStartedAt.toMillis === 'function')
            ? data.phaseStartedAt.toMillis()
            : (typeof data.phaseStartedAt.toDate === 'function')
                ? data.phaseStartedAt.toDate().getTime()
                : Number(data.phaseStartedAt);
        if (startedMs > 0) {
            autonomous = true;
            const elapsed = Math.max(0, Math.floor((Date.now() - startedMs) / 1000));
            serverSecs = Math.min(elapsed, phaseLimit);
            // Si el tiempo autónomo alcanzó el tope de descuento, la parte se
            // considera agotada aunque el entrenador (ausente) no haya marcado
            // la transición. Etiqueta de espectador: 1ª parte -> DESCANSO,
            // 2ª parte -> FIN DE PARTIDO. (Solo presentación: no escribe en Firestore.)
            if (elapsed >= phaseLimit) {
                document.getElementById('live-phase').textContent =
                    (phase === '2nd_half') ? 'FIN DE PARTIDO' : 'DESCANSO';
            }
        }
    }

    // Si el partido está corriendo, compensar el tiempo transcurrido
    // desde que el servidor guardó el snapshot hasta ahora.
    // FALLBACK: solo si NO hay phaseStartedAt (snapshots antiguos).
    if (!autonomous && data.isRunning && data.updatedAt && (phase === '1st_half' || phase === '2nd_half')) {
        let serverTimeMs = 0;
        if (typeof data.updatedAt.toMillis === 'function') {
            serverTimeMs = data.updatedAt.toMillis();
        } else if (typeof data.updatedAt.toDate === 'function') {
            serverTimeMs = data.updatedAt.toDate().getTime();
        } else {
            serverTimeMs = new Date(data.updatedAt).getTime();
        }
        if (serverTimeMs > 0) {
            const elapsed = Math.max(0, Math.floor((Date.now() - serverTimeMs) / 1000));
            const remaining = Math.max(0, phaseLimit - serverSecs);
            const delta = Math.min(elapsed, remaining);
            serverSecs += delta;
            // Actualizar tiempos de jugadores con el delta
            if (delta > 0 && Array.isArray(data.players)) {
                data.players = data.players.map(p => ({
                    ...p,
                    time: p.status === 'field' ? (p.time || 0) + delta : (p.time || 0)
                }));
            }
        }
    }

    // Actualizar base con datos del servidor
    window._timerBase = {
        secs:      serverSecs,
        wallClock: Date.now(),
        maxTime:   maxTime,
        phase:     phase,
        isLive:    isLive,
        isRunning: !!(data.isRunning),
        phaseLimit:     phaseLimit,
        autonomous:     autonomous,
        phaseStartedMs: autonomous
            ? ((typeof data.phaseStartedAt.toMillis === 'function')
                ? data.phaseStartedAt.toMillis()
                : (typeof data.phaseStartedAt.toDate === 'function')
                    ? data.phaseStartedAt.toDate().getTime()
                    : Number(data.phaseStartedAt))
            : 0
    };

    // Mostrar tiempo inmediatamente
    updateTimerDisplay(serverSecs, maxTime, phase);

    // Arrancar el intervalo UNA SOLA VEZ
    if (!timerInterval) {
        timerInterval = setInterval(() => {
            const b = window._timerBase;
            if (!b) return;
            if (!b.isRunning || !b.isLive ||
                b.phase === 'break' || b.phase === 'halftime' || b.phase === 'finished') {
                // Partido pausado o en descanso: mostrar el tiempo fijo del snapshot
                updateTimerDisplay(b.secs, b.maxTime, b.phase);
                return;
            }
            // Modo autónomo: derivar del epoch absoluto; topado en phaseLimit.
            let current, elapsed;
            if (b.autonomous && b.phaseStartedMs > 0) {
                current = Math.min(Math.floor((Date.now() - b.phaseStartedMs) / 1000), b.phaseLimit);
                elapsed = (Date.now() - b.wallClock) / 1000;
            } else {
                elapsed = (Date.now() - b.wallClock) / 1000;
                current = Math.min(Math.floor(b.secs + elapsed), b.phaseLimit);
            }
            updateTimerDisplay(current, b.maxTime, b.phase);
            tickPlayerTimes(elapsed);
        }, 250);
    }

    // Field & bench
    renderField(data);
    renderBench(data);
}

function getTimerColor(timeSec, halfMaxTime) {
    // timeSec es el tiempo transcurrido en la parte actual; halfMaxTime es la
    // duración reglamentaria de esa parte. Color por tiempo RESTANTE de la parte:
    // verde al principio, ámbar a mitad, rojo cuando queda poco.
    const maxSec = halfMaxTime || window._liveMaxTime || 1800;
    const remaining = Math.max(0, maxSec - timeSec);
    if (remaining > maxSec / 2) return '#2ea043'; // > 50% restante → verde
    if (remaining > maxSec / 4) return '#e3b341'; // 25-50% restante → ámbar
    return '#da3633';                              // < 25% restante → rojo
}

function updateTimerDisplay(secs, maxTime, phase) {
    // Misma lógica que la app: cuenta atrás hasta 0, luego tiempo añadido
    maxTime = maxTime || window._liveMaxTime || (30 * 60);
    phase   = phase   || window._livePhase   || '1st_half';

    let display;
    const isBreak    = phase === 'break' || phase === 'halftime';
    const isFinished = phase === 'finished';

    if (isBreak || isFinished) {
        // Descanso o fin: mostrar 0:00
        display = 0;
    } else if (secs <= maxTime) {
        // Cuenta atrás normal: maxTime - elapsed
        display = maxTime - secs;
    } else {
        // Tiempo añadido: secs - maxTime (cuenta hacia adelante desde 0)
        display = secs - maxTime;
    }

    const added   = secs > maxTime && !isBreak && !isFinished;
    const timerEl = document.getElementById('live-timer');
    const m = Math.floor(display / 60).toString().padStart(2, '0');
    const s = (display % 60).toString().padStart(2, '0');
    timerEl.textContent = (added ? '+' : '') + m + ':' + s;
    timerEl.style.color = added ? '#f0883e' : getTimerColor(secs, maxTime);
}

function formatTime(secs) {
    const m = Math.floor(secs / 60).toString().padStart(2, '0');
    const s = (secs % 60).toString().padStart(2, '0');
    return `${m}:${s}`;
}

function tickPlayerTimes(elapsed) {
    const els = document.querySelectorAll('.live-player-time[data-base-time]');
    els.forEach(el => {
        const base = parseInt(el.getAttribute('data-base-time')) || 0;
        el.textContent = formatTime(Math.floor(base + elapsed));
    });
}

// ── Sanitización XSS ────────────────────────────────────────────────
// Escapa texto para inserción segura en innerHTML (datos de Firestore
// controlables por el entrenador: nombres de equipo/jugador, email...).
function escapeHtml(value) {
    if (value == null) return '';
    return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}
// Valida un color CSS (hex #rgb/#rrggbb, rgb()/rgba(), o nombre simple).
// Si no es válido devuelve el fallback (evita CSS/atributo injection).
function safeColor(value, fallback) {
    if (typeof value === 'string' &&
        /^(#[0-9a-fA-F]{3,8}|rgb\(\s*[\d.]+\s*,\s*[\d.]+\s*,\s*[\d.]+\s*\)|rgba\(\s*[\d.]+\s*,\s*[\d.]+\s*,\s*[\d.]+\s*,\s*[\d.]+\s*\)|[a-zA-Z]{1,20})$/.test(value.trim())) {
        return value.trim();
    }
    return fallback;
}

// ── Semáforo de tiempo jugado ──────────────────────────────────────
// Color compartido por campo (live-player-time) y banquillo (bench-time):
// rojo por defecto, amarillo a partir de total/3, verde a partir de total/2.
// total = half1Max + half2Max, con fallback f7=1800/parte, f11=2400/parte.
// Sin caso especial para 00:00 (cae en rojo por la cadena de comparaciones).
function _timerColorFor(timeSec, data) {
    const half1Max = data.half1MaxTime || (data.mode === 'f7' ? 1800 : 2400);
    const half2Max = data.half2MaxTime || (data.mode === 'f7' ? 1800 : 2400);
    const totalSec = half1Max + half2Max;
    const t = timeSec || 0;
    if (t >= totalSec / 2) return { bg: '#2ea043', text: '#000000' };
    if (t >= totalSec / 3) return { bg: '#e3b341', text: '#000000' };
    return { bg: '#da3633', text: '#ffffff' };
}

// ── Render field ───────────────────────────────────────────────────
function renderField(data) {
    const pitch   = document.getElementById('live-pitch');
    const players = (data.players || []).filter(p => p.status === 'field');

    pitch.innerHTML = players.map(p => {
        const isHome = p.team === 'home';
        // FIX: usar color individual del jugador (incluido en snapshot) con fallback al color del equipo
        const color  = safeColor(p.color,     safeColor(isHome ? data.homeTeam?.color     : data.awayTeam?.color,     isHome ? '#58a6ff' : '#ff5858'));
        const shortsColor = safeColor(p.shortsColor, safeColor(isHome ? data.homeTeam?.shorts : data.awayTeam?.shorts, isHome ? '#1a4e99' : '#b22222'));
        const text   = safeColor(p.textColor, safeColor(isHome ? data.homeTeam?.textColor : data.awayTeam?.textColor, '#fff'));

        const goals     = p.goals  || 0;
        const hasGoal   = goals > 0;
        const hasYellow = p.cards === 'amarilla';
        const hasRed    = p.cards === 'roja';
        const isInjured = p.injured === true;
        let chipClass   = hasRed ? 'chip-red' : hasYellow ? 'chip-yellow' : hasGoal ? 'chip-goal' : '';
        if (isInjured) chipClass += ' chip-injured';
        const goalLabel = hasGoal ? `⚽×${goals}` : '';

        const xPct = Math.max(3, Math.min(97, p.x || 50));
        const yPct = Math.max(3, Math.min(97, p.y || 50));

        // Calcular color del timer según minutos jugados (función compartida con renderBench)
        const timeSec = p.time || 0;
        const { bg: timerBg, text: timerText } = _timerColorFor(timeSec, data);

        return `<div class="live-player" style="left:${xPct}%;top:${yPct}%;">
            <div class="live-player-time" data-base-time="${timeSec}" style="background:${timerBg}; color:${timerText};">${formatTime(timeSec)}</div>
            <div class="live-player-chip ${chipClass}"
                 data-goal-label="${goalLabel}"
                 style="background:linear-gradient(to bottom, ${color} 50%, ${shortsColor} 50%);color:${text};">
                ${escapeHtml(p.number)}
            </div>
            <div class="live-player-label">${escapeHtml(p.name)}</div>
        </div>`;
    }).join('');
}

// ── Render bench ───────────────────────────────────────────────────
function renderBench(data) {
    const players = data.players || [];

    ['home', 'away'].forEach(team => {
        const containerId = team === 'home' ? 'bench-home' : 'bench-away';
        const container   = document.getElementById(containerId);
        const teamData    = team === 'home' ? data.homeTeam : data.awayTeam;
        const teamColor   = teamData?.color || (team === 'home' ? '#58a6ff' : '#ff5858');

        const benchPlayers = players
            .filter(p => p.team === team && p.status === 'bench')
            .sort((a, b) => (a.number || 0) - (b.number || 0));

        if (benchPlayers.length === 0) {
            container.innerHTML = '<p style="color:var(--muted);font-size:0.72rem;padding:0.3rem 0;">Sin suplentes</p>';
            return;
        }

        container.innerHTML = benchPlayers.map(p => {
            // FIX: usar color individual del jugador con fallback al color del equipo
            const color = safeColor(p.color, safeColor(teamColor, team === 'home' ? '#58a6ff' : '#ff5858'));
            const shortsColor = safeColor(p.shortsColor, safeColor(team === 'home' ? data.homeTeam?.shorts : data.awayTeam?.shorts, team === 'home' ? '#1a4e99' : '#b22222'));
            const cardIcon = p.cards === 'amarilla' ? ' 🟨' : p.cards === 'roja' ? ' 🟥' : '';
            const goalIcon = (p.goals || 0) > 0 ? ` ⚽×${p.goals}` : '';

            // Semáforo de tiempo jugado (misma función/regla que renderField).
            // Igual que en campo, el color va en la etiqueta de tiempo (.bench-time), no en el dorsal.
            const timeSec = p.time || 0;
            const { bg: timerBg, text: timerText } = _timerColorFor(timeSec, data);

            return `<div class="bench-player-row">
                <div class="bench-dot" style="background:linear-gradient(to bottom, ${color} 50%, ${shortsColor} 50%);color:#0a0e14;">${escapeHtml(p.number)}</div>
                <div class="bench-info">
                    <div class="bench-name">${escapeHtml(p.name)}${cardIcon}${goalIcon}${p.injured ? ' <span style="color:#e74c3c;font-size:0.7rem;">✚</span>' : ''}</div>
                </div>
                <div class="bench-time" style="background:${timerBg}; color:${timerText};">${formatTime(timeSec)}</div>
            </div>`;
        }).join('');
    });
}

// ── Show history ───────────────────────────────────────────────────
// ── Pantalla principal: partidos EN VIVO ──────────────────────────
let _liveListUnsubscribe = null;
let _liveListTimerInterval = null;

window.showLiveNow = async function() {

    // Cambiar título del historial a "EN VIVO"

        <div>

    try {
        const q = collection(db, 'live_matches');
        console.log("[LIVE] Subscribing to live list...");
        
        _liveListUnsubscribe = onSnapshot(q, (snap) => {
            const liveMatches = [];
            const allDocs = [];
            snap.forEach(d => { allDocs.push({ id: d.id, ...d.data() }); });
        // Ordenar cliente (sin índice Firestore)
        allDocs.sort((a,b) => (b.updatedAt?.toMillis?.() || 0) - (a.updatedAt?.toMillis?.() || 0));
        
        allDocs.forEach(m => { 
            if (m.status !== 'active') return;

            // Filtrado por jerarquía
            const isSA = (userData.role === 'superadmin' || userData.role === 'admin');

            if (isSA) {
                // Si hay filtro activo de club
                if (window._saClubFilter) {
                    if (m.clubId === window._saClubFilter) liveMatches.push(m);
                } else {
                    // Vista global: Ve todo
                    liveMatches.push(m);
                }
            } else if (userData.clubId && m.clubId === userData.clubId) {
                // Miembros del club (director/coordinador/padre/entrenador) ven
                // los partidos en vivo de su club.
                liveMatches.push(m);
            } else if (m.createdBy && m.createdBy === userData.uid) {
                // El propio entrenador que inició el partido siempre lo ve,
                // aunque el clubId aún no esté propagado.
                liveMatches.push(m);
            } else if (m.coachEmail && userData.email &&
                       m.coachEmail.toLowerCase() === userData.email.toLowerCase()) {
                // Backup para entrenadores sin clubId asignado formalmente.
                liveMatches.push(m);
            }
            // Partidos sin clubId (datos legacy/test) solo los ve superadmin/admin
            // arriba; no se exponen al resto por privacidad.
        });

        listEl.innerHTML = '';

        if (liveMatches.length === 0) {

        liveMatches.forEach(m => {

                'background:linear-gradient(135deg,rgba(255,88,88,0.08),rgba(255,88,88,0.03));' +
                'padding:1.2rem;';
            card.innerHTML = `

                <div style="display:flex;justify-content:space-between;
                            align-items:center;margin-bottom:0.8rem;">
                    <div style="display:flex;align-items:center;gap:0.5rem;">
                        <div style="width:8px;height:8px;border-radius:50%;
                                    background:#ff5858;flex-shrink:0;
                                    animation:pulse 1.5s ease-in-out infinite;"></div>
                        <span style="font-size:0.7rem;font-weight:700;

                    </div>
                    <span style="font-size:0.75rem;color:var(--muted);">

                    </span>
                </div>

                <!-- Marcador -->
                <div style="display:flex;align-items:center;
                            justify-content:center;gap:1.5rem;margin-bottom:0.8rem;">
                    <div style="text-align:center;flex:1;">
                        <div style="font-size:0.8rem;font-weight:700;
                                    color:var(--primary);letter-spacing:0.5px;
                                    margin-bottom:0.3rem;">
                            ${escapeHtml(m.homeTeam?.name||'LOCAL')}
                        </div>
                        <div style="font-family:'Outfit',sans-serif;
                                    font-size:2.2rem;font-weight:700;
                                    color:var(--text);line-height:1;">
                            ${m.homeTeam?.score??0}
                        </div>
                        <div style="font-size:0.7rem;color:var(--muted);margin-top:0.2rem;">
                            ${homePlayers} en campo

                    </div>
                    <!-- CRONÓMETRO NUEVO EN MEDIO -->
                    <div style="text-align:center; min-width: 70px;">
                        <div class="live-list-timer" data-match='${escapeHtml(JSON.stringify(m))}'

                    </div>

                            ${escapeHtml(m.awayTeam?.name||'VISITANTE')}
                        </div>
                        <div style="font-family:'Outfit',sans-serif;

                                    color:var(--text);line-height:1;">

                        </div>
                        <div style="font-size:0.7rem;color:var(--muted);margin-top:0.2rem;">

                    </div>
                </div>

                <!-- Entrenador + botón -->
                <div style="display:flex;justify-content:space-between;

                            padding-top:0.7rem;">
                    <div style="font-size:0.72rem;color:var(--muted);">
                        ${(m.coachEmail && (userData.role === 'superadmin' || userData.role === 'admin')) ? '👨‍💼 ' + escapeHtml(m.coachEmail) : ''}
                    </div>
                    <button style="padding:0.55rem 1.2rem;background:#ff5858;
                                   border:none;border-radius:8px;color:#fff;

            card.onclick = () => {
                history.pushState({}, '', '?match=' + m.id);
                loadMatch(m.id);
            };
            listEl.appendChild(card);
        });

        }); // fin onSnapshot callback

        // Levantar el setInterval para los relojes de las tarjetas
        _liveListTimerInterval = setInterval(() => {
            document.querySelectorAll('.live-list-timer').forEach(el => {
                const m = JSON.parse(el.getAttribute('data-match') || '{}');
                const phase = m.phase || '1st_half';
                const isBreak = phase === 'break' || phase === 'halftime' || phase === 'finished';
                
                let secs = (phase === '2nd_half' ? m.timeH2 : m.timeH1) || 0;
                const maxTime = phase === '2nd_half' ? (m.half2MaxTime || (m.mode==='f7'?1800:2400)) : (m.half1MaxTime || (m.mode==='f7'?1800:2400));
                const phaseLimit = maxTime + (m.mode === 'f7' ? 600 : 900);

                if (m.isRunning && !isBreak) {
                    // Reutilizar matemática de modo autónomo
                    if (m.phaseStartedAt) {
                        const startedMs = typeof m.phaseStartedAt === 'object' && m.phaseStartedAt.seconds 
                                ? m.phaseStartedAt.seconds * 1000 
                                : Number(m.phaseStartedAt);
                        if (startedMs > 0) {
                            const elapsed = Math.max(0, Math.floor((Date.now() - startedMs) / 1000));
                            secs = Math.min(elapsed, phaseLimit);
                        }
                    } else if (m.updatedAt) {
                        const serverTimeMs = typeof m.updatedAt === 'object' && m.updatedAt.seconds
                                ? m.updatedAt.seconds * 1000
                                : new Date(m.updatedAt).getTime();
                        if (serverTimeMs > 0) {
                            const elapsed = Math.max(0, Math.floor((Date.now() - serverTimeMs) / 1000));
                            const remaining = Math.max(0, phaseLimit - secs);
                            secs += Math.min(elapsed, remaining);
                        }
                    }
                }
                
                // Lógica de mostrar añadido (+)
                let display = isBreak ? 0 : (secs <= maxTime ? (maxTime - secs) : (secs - maxTime));
                const min = Math.floor(display / 60).toString().padStart(2, '0');
                const sec = (display % 60).toString().padStart(2, '0');
                const isAdded = secs > maxTime && !isBreak;
                
                el.textContent = (isAdded ? '+' : '') + min + ':' + sec;
                el.style.color = isAdded ? '#f0883e' : (secs < maxTime/2 ? '#2ea043' : '#e3b341'); // Mismos colores que renderMatch
            });
        }, 1000);

    } catch(err) {
        console.error('[LIVE] showLiveNow ERROR:', err);
        listEl.innerHTML = `<div style="text-align:center;padding:2rem;"><p style="color:#ff5858;font-size:1rem;font-weight:700;margin-bottom:0.5rem;">⚠️ Error al cargar</p><p style="color:#ff5858;font-size:0.85rem;">${err.message}</p><p style="color:var(--muted);font-size:0.75rem;margin-top:0.5rem;">Comprueba la conexión y vuelve a intentarlo</p><button onclick="showLiveNow()" style="margin-top:1rem;padding:0.6rem 1.4rem;background:rgba(255,88,88,0.2);border:1px solid rgba(255,88,88,0.5);border-radius:8px;color:#ff5858;cursor:pointer;font-weight:700;">🔄 Reintentar</button></div>`;
    }
};

// ── Navegación entre partidos ─────────────────────────────────────
let _matchList = [];      // lista cacheada de todos los partidos (24h)
let _matchListIdx = -1;   // posición actual en la lista

window.navigateMatch = function(dir) {
    if (_matchList.length === 0) return;
    _matchListIdx = Math.max(0, Math.min(_matchList.length - 1, _matchListIdx + dir));
    const m = _matchList[_matchListIdx];
    if (m) {
        history.pushState({}, '', '?match=' + m.id);
        loadMatch(m.id);
        updateNavButtons();
    }
};

function updateNavButtons() {
    const nav = document.getElementById('btn-match-nav');
    if (!nav) return;
    nav.style.display = _matchList.length > 1 ? 'flex' : 'none';
}

function setMatchListContext(matches, currentId) {
    _matchList = matches;
    _matchListIdx = matches.findIndex(m => m.id === currentId);
    if (_matchListIdx === -1) _matchListIdx = 0;
    updateNavButtons();
}

window.toggleKeepMatch = async function(matchId, e) {
    if (e) e.stopPropagation();
    try {
        const { doc, updateDoc } = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js');
        const matchData = window._allFetchedMatches?.find(m => m.id === matchId);
        const newKeep = matchData ? !matchData.keep : true;
        await updateDoc(doc(db, 'live_matches', matchId), { keep: newKeep });
        if (matchData) matchData.keep = newKeep;
        showHistory(); // Refrescar vista
    } catch(err) {
        console.error(err);
        alert('Error al guardar: ' + err.message);
    }
};

window.deleteMatch = async function(matchId, e) {
    if (e) e.stopPropagation();
    if (!confirm('¿Eliminar definitivamente este partido del historial?')) return;
    try {
        const { doc, deleteDoc } = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js');
        await deleteDoc(doc(db, 'live_matches', matchId));
        showHistory(); // Refrescar vista
    } catch(err) {
        console.error(err);
        alert('Error al eliminar: ' + err.message);
    }
};

    window._prevPhase = null; // reset para resinc al volver
    document.getElementById('scoreboard').style.display   = 'none';
    document.getElementById('live-main').style.display    = 'none';

        const liveMatches = [], finishedMatches = [];

        window._allFetchedMatches = allDocs2;

        allDocs2.sort((a,b) => (b.updatedAt?.toMillis?.() || 0) - (a.updatedAt?.toMillis?.() || 0));
        
        const { doc, deleteDoc } = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js');
        
        allDocs2.forEach(m => {
            const updated = m.updatedAt?.toDate?.() || new Date(0);
            if (m.status === 'active') {
                liveMatches.push(m);
            } else {
                if (updated <= twentyFourHoursAgo && !m.keep) {
                    // Auto-borrar si tiene más de 24h y no está marcado como guardado
                    deleteDoc(doc(db, 'live_matches', m.id)).catch(err => console.warn('Error auto-borrado:', err));

function showLoadingScreen(msg) {
    document.getElementById('scoreboard').style.display      = 'none';
    document.getElementById('live-main').style.display       = 'none';
    document.getElementById('history-view').style.display    = 'none';
    document.getElementById('loading-screen').style.display  = 'flex';
    document.getElementById('loading-msg').textContent       = msg;
}
</script>
<div id="event-flash"></div>
<div id="event-toast-stack"></div>
</body>
