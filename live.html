<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chronos Fútbol - Live View</title>
    <meta name="theme-color" content="#0a0e14">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Outfit:wght@600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg:         #0a0e14;
            --surface:    #0d1117;
            --glass:      rgba(255,255,255,0.05);
            --border:     rgba(255,255,255,0.1);
            --primary:    #58a6ff;
            --secondary:  #f0883e;
            --success:    #3fb950;
            --danger:     #ff5858;
            --text:       #cdd9e5;
            --muted:      #7d8590;
        }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh; display: flex; flex-direction: column;
        }

        /* ── AUTH OVERLAY ── */
        #auth-overlay {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; align-items: center; justify-content: center;
            padding: 1rem; z-index: 999;
        }
        .auth-card {
            width: 100%; max-width: 360px;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 16px; padding: 2rem;
        }
        .auth-card h1 {
            font-family: 'Outfit', sans-serif; color: var(--primary);
            font-size: 1.5rem; text-align: center; margin-bottom: 0.2rem;
        }
        .auth-card p { color: var(--muted); font-size: 0.8rem; text-align: center; margin-bottom: 1.5rem; }
        .auth-input {
            width: 100%; padding: 0.75rem;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px; color: white; font-size: 0.95rem;
            outline: none; margin-bottom: 0.8rem;
        }
        .auth-btn {
            width: 100%; padding: 0.9rem;
            background: var(--primary); border: none;
            border-radius: 8px; color: #0a0e14;
            font-weight: 700; font-size: 1rem; cursor: pointer;
        }
        #auth-error { color: var(--danger); font-size: 0.8rem; text-align: center; min-height: 1.2rem; margin-top: 0.6rem; }

        /* ── HEADER ── */
        #live-header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0.7rem 1.2rem;
            display: flex; align-items: center; justify-content: space-between;
            gap: 1rem; flex-wrap: wrap;
        }
        #live-header .logo {
            font-family: 'Outfit', sans-serif;
            color: var(--primary); font-size: 0.95rem; font-weight: 700;
            display: flex; align-items: center; gap: 0.4rem;
        }
        #live-header .logo span { color: var(--secondary); }
        #live-badge {
            display: flex; align-items: center; gap: 0.4rem;
            background: rgba(255,88,88,0.15);
            border: 1px solid rgba(255,88,88,0.4);
            border-radius: 20px; padding: 3px 12px;
            font-size: 0.72rem; font-weight: 700; color: #ff5858;
        }
        #live-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: #ff5858;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
        #last-update { color: var(--muted); font-size: 0.7rem; }
        #btn-history {
            padding: 0.4rem 0.9rem;
            background: var(--glass); border: 1px solid var(--border);
            border-radius: 6px; color: var(--muted);
            font-size: 0.75rem; cursor: pointer;
        }

        /* ── SCOREBOARD ── */
        #scoreboard {
            background: linear-gradient(135deg, rgba(88,166,255,0.08), rgba(240,136,62,0.06));
            border-bottom: 1px solid var(--border);
            padding: 1rem 1.2rem;
            display: flex; align-items: center; justify-content: center;
            gap: 1.5rem; flex-wrap: wrap;
        }
        .team-score-block { text-align: center; }
        .team-score-name {
            font-size: 0.75rem; font-weight: 700;
            letter-spacing: 1px; color: var(--muted); margin-bottom: 0.2rem;
        }
        .team-score-num {
            font-family: 'Outfit', sans-serif;
            font-size: 2.8rem; font-weight: 700; line-height: 1;
        }
        .score-sep { font-size: 2rem; color: var(--muted); font-weight: 300; }
        .match-meta {
            display: flex; flex-direction: column; align-items: center; gap: 0.3rem;
        }
        #live-timer {
            font-family: 'Outfit', sans-serif;
            font-size: 1.6rem; font-weight: 700; color: var(--primary);
        }
        #live-phase {
            font-size: 0.7rem; color: var(--muted);
            background: var(--glass); border-radius: 4px;
            padding: 2px 8px; letter-spacing: 1px;
        }
        #live-mode { font-size: 0.72rem; color: var(--muted); }

        /* ── MAIN LAYOUT ── */
        #live-main {
            flex: 1; display: flex; gap: 0; overflow: hidden;
        }

        /* ── FIELD ── */
        #field-wrap {
            flex: 1; padding: 0.8rem;
            display: flex; align-items: center; justify-content: center;
        }
        #live-pitch {
            width: 100%; max-width: 700px;
            aspect-ratio: 3/2;
            background:
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px),
                radial-gradient(ellipse 60% 40% at 50% 50%, rgba(255,255,255,0.04) 0%, transparent 70%),
                linear-gradient(160deg, #0d2818 0%, #0a1f10 50%, #0d2818 100%);
            background-size: 33.3% 50%, 33.3% 50%, 100% 100%, 100% 100%;
            border: 2px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            position: relative; overflow: hidden;
        }
        /* Field lines */
        #live-pitch::before {
            content: '';
            position: absolute; inset: 0;
            background:
                /* Center line */
                linear-gradient(90deg, transparent 49.5%, rgba(255,255,255,0.2) 49.5%, rgba(255,255,255,0.2) 50.5%, transparent 50.5%),
                /* Center circle */
                radial-gradient(circle 60px at 50% 50%, transparent 58px, rgba(255,255,255,0.2) 58px, rgba(255,255,255,0.2) 60px, transparent 60px),
                /* Left penalty area */
                linear-gradient(90deg, transparent 15%, rgba(255,255,255,0.12) 15%, rgba(255,255,255,0.12) 15.5%, transparent 15.5%),
                linear-gradient(0deg, transparent 25%, rgba(255,255,255,0.12) 25%, rgba(255,255,255,0.12) 25.5%, transparent 25.5%),
                linear-gradient(0deg, transparent 74.5%, rgba(255,255,255,0.12) 74.5%, rgba(255,255,255,0.12) 75%, transparent 75%),
                /* Right penalty area */
                linear-gradient(90deg, transparent 84.5%, rgba(255,255,255,0.12) 84.5%, rgba(255,255,255,0.12) 85%, transparent 85%);
            pointer-events: none;
        }
        .live-player {
            position: absolute;
            transform: translate(-50%, -50%);
            display: flex; flex-direction: column;
            align-items: center; gap: 3px;
            cursor: default;
        }
        .live-player-chip {
            width: 42px; height: 42px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.9rem; font-weight: 800;
            border: 2.5px solid rgba(255,255,255,0.7);
            box-shadow: 0 3px 12px rgba(0,0,0,0.7),
                        0 0 0 1px rgba(0,0,0,0.4);
            position: relative;
        }
        .live-player-label {
            font-size: 0.68rem; font-weight: 800;
            background: rgba(0,0,0,0.82);
            color: #f5f0e8;
            border-radius: 4px;
            padding: 2px 6px;
            white-space: nowrap;
            max-width: 68px;
            overflow: hidden;
            text-overflow: ellipsis;
            letter-spacing: 0.3px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.8);
        }
        .live-player-time {
            font-size: 0.6rem;
            font-weight: 700;
            color: #f5f0e8;
            background: rgba(0,0,0,0.65);
            border-radius: 3px;
            padding: 1px 5px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.9);
        }
        /* chip-goal usa atributo data-goals para mostrar número */
        .chip-goal::after {
            content: attr(data-goal-label);
            position: absolute; top: -10px; right: -10px;
            font-size: 0.65rem; font-weight: 700;
            background: rgba(0,0,0,0.85);
            color: #fff; border-radius: 4px;
            padding: 1px 4px; white-space: nowrap;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .chip-yellow::after { content: '🟨'; position:absolute; bottom:-6px; right:-6px; font-size:0.75rem; z-index:35; }
        .chip-red::after    { content: '🟥'; position:absolute; bottom:-6px; right:-6px; font-size:0.75rem; z-index:35; }
        /* Indicador de lesión en live — lado izquierdo */
        .chip-injured::before {
            content: '✚';
            position: absolute; bottom: -6px; left: -6px;
            width: 15px; height: 15px; border-radius: 50%;
            background: #e74c3c; color: #fff;
            font-size: 0.55rem; font-weight: 700;
            display: flex; align-items: center; justify-content: center;
            border: 1.5px solid #fff;
        }

        /* ── BENCH PANEL ── */
        #bench-panel {
            width: 200px; flex-shrink: 0;
            background: var(--surface);
            border-left: 1px solid var(--border);
            overflow-y: auto; padding: 0.8rem;
        }
        .bench-section-title {
            font-size: 0.65rem; font-weight: 700; letter-spacing: 1px;
            color: var(--muted); margin-bottom: 0.5rem; margin-top: 0.8rem;
        }
        .bench-section-title:first-child { margin-top: 0; }
        .bench-player-row {
            display: flex; align-items: center; gap: 0.5rem;
            padding: 0.4rem 0.5rem; border-radius: 6px;
            background: var(--glass); margin-bottom: 4px;
        }
        .bench-dot {
            width: 20px; height: 20px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.6rem; font-weight: 700; flex-shrink: 0;
        }
        .bench-info { flex: 1; overflow: hidden; }
        .bench-name { font-size: 0.75rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .bench-num  { font-size: 0.65rem; color: var(--muted); }
        .bench-time { font-size: 0.65rem; color: var(--muted); text-align: right; }

        /* ── HISTORY VIEW ── */
        #history-view {
            display: none; flex: 1; flex-direction: column; overflow: hidden;
        }
        #history-header {
            padding: 1rem 1.2rem;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
        }
        #history-list {
            flex: 1; overflow-y: auto; padding: 1rem;
        }
        .history-card {
            background: var(--glass); border: 1px solid var(--border);
            border-radius: 10px; padding: 0.9rem 1rem;
            margin-bottom: 0.7rem; cursor: pointer;
            transition: border-color 0.2s;
        }
        .history-card:hover { border-color: var(--primary); }
        .history-card-top {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 0.3rem;
        }
        .history-match { font-weight: 700; font-size: 0.9rem; }
        .history-score {
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem; color: var(--primary); font-weight: 700;
        }
        .history-meta { font-size: 0.72rem; color: var(--muted); }
        .history-status-live   { color: #ff5858; font-size: 0.7rem; font-weight: 700; }
        .history-status-finish { color: var(--success); font-size: 0.7rem; }

        /* ── EMPTY / LOADING ── */
        #loading-screen {
            flex: 1; display: flex; align-items: center; justify-content: center;
            flex-direction: column; gap: 1rem;
        }
        #loading-screen p { color: var(--muted); font-size: 0.9rem; }
        .spinner { font-size: 2rem; animation: spin 1s linear infinite; }
        @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

        @media (max-width: 600px) {
            #bench-panel { display: none; }
            #live-header { padding: 0.5rem 0.8rem; }
        }

        /* ── ALERTAS DE EVENTO (sonoras + visuales) ── */
        #event-toast-stack {
            position: fixed; top: 1rem; right: 1rem;
            z-index: 1200; display: flex; flex-direction: column;
            gap: 0.55rem; max-width: min(380px, 92vw);
            pointer-events: none;
        }
        .event-toast {
            pointer-events: auto;
            display: flex; align-items: center; gap: 0.7rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-left: 4px solid var(--primary);
            border-radius: 10px; padding: 0.7rem 0.9rem;
            box-shadow: 0 8px 28px rgba(0,0,0,0.55);
            animation: toastIn 0.35s cubic-bezier(.2,.9,.3,1.2),
                       toastPulse 1.1s ease-in-out 0.35s 2;
            cursor: pointer;
        }
        .event-toast.leaving { animation: toastOut 0.3s ease forwards; }
        .event-toast .et-icon { font-size: 1.5rem; flex-shrink: 0; line-height: 1; }
        .event-toast .et-body { flex: 1; min-width: 0; }
        .event-toast .et-title {
            font-weight: 800; font-size: 0.84rem; color: var(--text);
            display: flex; align-items: center; gap: 0.4rem;
        }
        .event-toast .et-sub {
            font-size: 0.72rem; color: var(--muted); margin-top: 1px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .event-toast.ev-goal     { border-left-color: #3fb950; }
        .event-toast.ev-yellow   { border-left-color: #e3b341; }
        .event-toast.ev-red      { border-left-color: #da3633; }
        .event-toast.ev-sub      { border-left-color: #58a6ff; }
        .event-toast.ev-injury   { border-left-color: #e74c3c; }
        @keyframes toastIn {
            from { transform: translateX(120%); opacity: 0; }
            to   { transform: translateX(0);    opacity: 1; }
        }
        @keyframes toastOut {
            from { transform: translateX(0);    opacity: 1; max-height: 100px; }
            to   { transform: translateX(120%); opacity: 0; max-height: 0; margin: 0; padding: 0; }
        }
        @keyframes toastPulse {
            0%,100% { box-shadow: 0 8px 28px rgba(0,0,0,0.55); }
            50%     { box-shadow: 0 8px 28px rgba(0,0,0,0.55), 0 0 0 4px rgba(255,255,255,0.06); }
        }
        #event-flash {
            position: fixed; inset: 0; z-index: 1100;
            pointer-events: none; opacity: 0;
            background: radial-gradient(circle at 50% 30%, rgba(63,185,80,0.18), transparent 70%);
        }
        #event-flash.fire { animation: flashFx 0.65s ease-out; }
        @keyframes flashFx { 0%{opacity:0} 15%{opacity:1} 100%{opacity:0} }
        #btn-mute {
            padding: 0.4rem 0.7rem; background: var(--glass);
            border: 1px solid var(--border); border-radius: 6px;
            color: var(--muted); font-size: 0.82rem; cursor: pointer;
        }
        #btn-mute.muted { color: var(--danger); border-color: rgba(255,88,88,0.4); }
        #btn-activate-sound {
            padding: 0.4rem 0.7rem; background: rgba(63,185,80,0.15);
            border: 1px solid rgba(63,185,80,0.5); border-radius: 6px;
            color: #3fb950; font-size: 0.82rem; cursor: pointer; font-weight: 700;
            animation: pulseSound 1.6s ease-in-out infinite;
        }
        #btn-activate-sound.ready { animation: none; background: var(--glass);
            border-color: var(--border); color: var(--muted); font-weight: 400; }
        @keyframes pulseSound {
            0%,100% { box-shadow: 0 0 0 0 rgba(63,185,80,0.4); }
            50%     { box-shadow: 0 0 0 6px rgba(63,185,80,0); }
        }
    </style>
</head>
<body>

<!-- ── STARTUP LOADING (oculto en cuanto Firebase responde) ── -->
<div id="startup-screen" style="position:fixed;inset:0;background:#0a0e14;display:flex;align-items:center;justify-content:center;z-index:1000;flex-direction:column;gap:1rem;">
    <div style="font-size:2.5rem;animation:spin 1s linear infinite;">⚙️</div>
    <p style="color:#7d8590;font-size:0.9rem;">Verificando sesión…</p>
</div>

<!-- ══ LOGIN ═══════════════════════════════════════════════════════ -->
<div id="auth-overlay" style="display:none;">
    <div class="auth-card">
        <div style="display:flex;justify-content:center;margin-bottom:1.5rem;">
            <img src="public/assets/img_29448ebf.png" alt="Chronos Fútbol" 
                 style="width:220px;height:auto;object-fit:contain;display:block;filter:drop-shadow(0 4px 12px rgba(0,0,0,0.5));">
        </div>
        <p>Seguimiento en directo · Director Deportivo</p>
        <input class="auth-input" type="email"    id="live-email"    placeholder="tu@email.com">
        <input class="auth-input" type="password" id="live-password" placeholder="••••••••">
        <button class="auth-btn" onclick="doLiveAuth()">ENTRAR</button>
        <p id="auth-error"></p>
    </div>
</div>

<!-- ══ HEADER ══════════════════════════════════════════════════════ -->
<header id="live-header" style="display:none;">
    <div class="logo" style="padding:0;display:flex;align-items:center;">
        <img src="public/assets/img_9801cc2f.jpeg" alt="Chronos Fútbol" 
             style="height:60px;width:auto;object-fit:contain;display:block;filter:drop-shadow(0 2px 6px rgba(0,0,0,0.4));">
    </div>
    <div id="live-badge"><div id="live-dot"></div><span id="badge-text">EN VIVO</span></div>
    <span id="last-update"></span>
    <div style="display:flex;gap:0.5rem;align-items:center;">
        <button onclick="window.location.href='index.html'"
            style="padding:0.4rem 0.9rem;background:rgba(88,166,255,0.1);
                   border:1px solid rgba(88,166,255,0.3);border-radius:6px;
                   color:var(--primary);font-size:0.75rem;font-weight:700;cursor:pointer;">
            🏠 INICIO
        </button>
        <button onclick="showLiveNow()"
            style="padding:0.4rem 0.9rem;background:rgba(255,88,88,0.15);
                   border:1px solid rgba(255,88,88,0.4);border-radius:6px;
                   color:#ff5858;font-size:0.75rem;font-weight:700;cursor:pointer;">
            🔴 EN VIVO
        </button>
        <button id="btn-history" onclick="showHistory()"
            style="padding:0.4rem 0.9rem;background:var(--glass);
                   border:1px solid var(--border);border-radius:6px;
                   color:var(--muted);font-size:0.75rem;cursor:pointer;">
            📋 Historial
        </button>
        <div id="btn-match-nav" style="display:none;gap:0.4rem;">
            <button onclick="navigateMatch(-1)" title="Partido anterior"
                style="padding:0.4rem 0.7rem;background:var(--glass);
                       border:1px solid var(--border);border-radius:6px;
                       color:var(--muted);font-size:0.82rem;cursor:pointer;">◀ Ant</button>
            <button onclick="navigateMatch(1)" title="Partido siguiente"
                style="padding:0.4rem 0.7rem;background:var(--glass);
                       border:1px solid var(--border);border-radius:6px;
                       color:var(--muted);font-size:0.82rem;cursor:pointer;">Sig ▶</button>
        </div>
    </div>
    <div style="display:flex;gap:0.4rem;align-items:center;">
        <button id="btn-back-to-match" onclick="backToMatch()" style="display:none;
            padding:0.4rem 0.9rem;background:rgba(63,185,80,0.12);
            border:1px solid rgba(63,185,80,0.4);border-radius:6px;
            color:#3fb950;font-size:0.75rem;font-weight:700;cursor:pointer;">
            ← MI PARTIDO
        </button>
        <button onclick="doSignOut()"
            style="padding:0.4rem 0.8rem;background:none;border:1px solid rgba(255,255,255,0.12);
                   color:var(--muted);font-size:0.72rem;border-radius:6px;cursor:pointer;">⏻ Salir</button>
        <button id="btn-mute" onclick="toggleMute()" title="Silenciar alertas">🔔</button>
        <button id="btn-activate-sound" onclick="activateSound()"
                title="Toca para activar el sonido de alertas en este dispositivo">🔊 Activar sonido</button>
    </div>
</header>

<!-- ── DEBUG STATUS (se oculta automáticamente) ──────────── -->
<div id="live-status" style="display:none;background:#1a2a3a;color:#58a6ff;padding:0.5rem 1rem;font-size:0.75rem;text-align:center;border-bottom:1px solid rgba(88,166,255,0.3);"><span id="live-status-text">Iniciando...</span></div>

<!-- ══ SCOREBOARD ═══════════════════════════════════════════════ -->
<div id="scoreboard" style="display:none;">
    <div class="team-score-block">
        <div class="team-score-name" id="sb-home-name">LOCAL</div>
        <div class="team-score-num" id="sb-home-score" style="color:var(--primary);">0</div>
    </div>
    <div class="match-meta">
        <div id="live-timer">00:00</div>
        <div id="live-phase">1ª PARTE</div>
        <div id="live-mode"></div>
    </div>
    <div class="team-score-block">
        <div class="team-score-name" id="sb-away-name">VISITANTE</div>
        <div class="team-score-num" id="sb-away-score" style="color:var(--danger);">0</div>
    </div>
</div>

<!-- ══ MAIN: CAMPO + BANQUILLO ════════════════════════════════════ -->
<div id="live-main" style="display:none;">
    <div id="field-wrap">
        <div id="live-pitch"></div>
    </div>
    <aside id="bench-panel">
        <div class="bench-section-title">LOCAL · BANQUILLO</div>
        <div id="bench-home"></div>
        <div class="bench-section-title">VISITANTE · BANQUILLO</div>
        <div id="bench-away"></div>
    </aside>
</div>

<!-- ══ HISTORIAL ═════════════════════════════════════════════════ -->
<div id="history-view">
    <div id="history-header">
        <h2 style="font-size:1rem; font-family:'Outfit',sans-serif;">📋 Historial de partidos</h2>
        <button onclick="showLive()"
            style="padding:0.4rem 0.9rem; background:var(--glass);
                   border:1px solid var(--border); border-radius:6px;
                   color:var(--muted); font-size:0.8rem; cursor:pointer;">
            ← En vivo
        </button>
    </div>

// El audio del navegador requiere un gesto del usuario. El login (clic) ya
// cuenta como gesto, pero re-desbloqueamos en el primer toque por seguridad.
function unlockAudio() {
    try {
        if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (_audioCtx.state === "suspended") _audioCtx.resume();
        // "Silent unlock": un buffer mudo arrancado de forma sincrona dentro del
        // gesto. Es lo unico que iOS acepta como desbloqueo real del audio.
        const buf = _audioCtx.createBuffer(1, 1, 22050);
        const src = _audioCtx.createBufferSource();
        src.buffer = buf;
        src.connect(_audioCtx.destination);
        src.start(0);
        // KEEP-ALIVE (clave para iPhone PWA standalone): tras el primer gesto
        // mantenemos el AudioContext permanentemente 'running' con un loop de
        // silencio inaudible. En iPhone instalado en pantalla de inicio, iOS
        // suspende el contexto entre gestos y NO permite resume() fuera de un
        // gesto; cuando la alerta llega por Firestore (sin gesto) el sonido no
        // sonaba ni una vez. Con el hardware de audio activo de forma continua,
        // el contexto sigue 'running' y _playSeq programa y suena sin gesto.
        _startKeepAlive();
    } catch(e) { /* sin audio disponible */ }
}

// Loop de silencio permanente que evita que iOS suspenda el AudioContext.
let _keepAliveSrc = null;
function _startKeepAlive() {
    try {
        if (!_audioCtx || _alertsMuted) return;
        if (_keepAliveSrc) return;                 // ya activo
        // Buffer de ~0.5 s de silencio, en bucle, a volumen 0.
        const frames = Math.floor(_audioCtx.sampleRate * 0.5);
        const buf = _audioCtx.createBuffer(1, frames, _audioCtx.sampleRate);
        const src = _audioCtx.createBufferSource();
        src.buffer = buf;
        src.loop = true;
        const g = _audioCtx.createGain();
        g.gain.value = 0;                           // inaudible
        src.connect(g); g.connect(_audioCtx.destination);
        src.start(0);
        _keepAliveSrc = src;
    } catch(e) { /* ignorar */ }
}
function _stopKeepAlive() {
    try { if (_keepAliveSrc) { _keepAliveSrc.stop(); _keepAliveSrc.disconnect(); } } catch(e){}
    _keepAliveSrc = null;
}
// iOS no dispara 'pointerdown' de forma fiable como gesto de audio: anadimos
// touchend y click. {once:false} para re-desbloquear tras cada interaccion.
["pointerdown", "touchend", "click"].forEach(ev =>
    document.addEventListener(ev, unlockAudio, { once: false, passive: true })
);
// iOS suspende el AudioContext en segundo plano / pantalla bloqueada. Al volver
// a primer plano reanudamos y reactivamos el keep-alive (el resume aqui no esta
// dentro de un gesto, pero en muchos casos basta; el siguiente toque lo asegura).
document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "visible" && _audioCtx) {
        if (_audioCtx.state === "suspended") _audioCtx.resume().catch(() => {});
        // El loop pudo detenerse al suspender; lo recreamos.
        _stopKeepAlive();
        _startKeepAlive();
    }
});
// Liberar listeners de Firestore al ocultar/cerrar la pagina. 'pagehide' cubre

// Sonidos sintéticos por tipo (sin archivos externos).
function playEventSound(type) {
    if (_alertsMuted) return;
    unlockAudio();
    if (!_audioCtx) return;
    const ctx = _audioCtx;
    // El contexto puede estar 'suspended' si esta llamada NO viene de un gesto
    // del usuario (p.ej. desde el callback de Firestore -> detectAndAlert). Si
    // leemos currentTime con el contexto suspendido, queda congelado y las 3
    // repeticiones se programan casi en el mismo instante -> al reanudar el
    // reloj salta y se colapsan en un solo golpe (se oye "una vez y corta").
    // Por eso SOLO programamos cuando el contexto esta 'running', releyendo
    // currentTime ya valido dentro del then() de resume().
    if (ctx.state === "running") {
        _playSeq(ctx, type);
    } else {
        ctx.resume().then(function(){ _playSeq(ctx, type); }).catch(function(){ /* sin audio */ });
    }
}

// Programa las 3 repeticiones de la secuencia leyendo currentTime en el momento
// (con el contexto ya 'running', para que los tiempos no esten congelados).
function _playSeq(ctx, type) {
    const now = ctx.currentTime;
    // [frecuencia(Hz), inicio(s), duracion(s)]
    // Secuencia CORTA original (melodia reconocible de cada evento). En lugar de
    // alargar cada nota (que sonaba a golpe + silencio por el decay exponencial),
    // repetimos la secuencia completa 3 veces (mas abajo) manteniendo su melodia.
    // Cada nota usa envolvente sostenida (sin huecos internos).
    const SEQ = {
        goal:   [[660,0,0.12],[880,0.12,0.12],[1175,0.24,0.22]],   // fanfarria ascendente
        yellow: [[520,0,0.18]],                                     // pitido medio
        red:    [[400,0,0.18],[300,0.20,0.30]],                    // doble grave
        sub:    [[700,0,0.10],[900,0.12,0.12]],                    // dos notas suaves
        injury: [[300,0,0.25],[260,0.27,0.35]]                     // tono descendente
    };
    const seq = SEQ[type] || SEQ.sub;
    const REPS = 3;                                     // 3 repeticiones fijas
    const GAP  = 0.06;                                  // pausa entre repeticiones
    // Duracion de una pasada = fin de su ultima nota.
    const seqDur = Math.max.apply(null, seq.map(function(n){ return n[1] + n[2]; }));
    const step   = seqDur + GAP;
    for (let r = 0; r < REPS; r++) {
        const base = r * step;
        seq.forEach(([freq, start, dur]) => {
            const osc  = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = (type === "goal") ? "triangle" : "sine";
            osc.frequency.value = freq;
            const t0  = now + base + start;
            const atk = 0.012;                            // ataque
            const rel = Math.min(0.05, dur * 0.35);       // release corto al final
            const sus = t0 + Math.max(atk, dur - rel);
            gain.gain.setValueAtTime(0.0001, t0);
            gain.gain.exponentialRampToValueAtTime(0.22, t0 + atk);   // ataque
            gain.gain.setValueAtTime(0.22, sus);                      // sostenido pleno
            gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur); // release corto
            osc.connect(gain); gain.connect(ctx.destination);
            osc.start(t0); osc.stop(t0 + dur + 0.02);
        });
    }
}

function showEventToast(type, line, sub) {

// Construye el mapa de estado por jugador a partir de un snapshot.
function _buildState(data) {
    const players = {};
    (data.players || []).forEach(p => {
        if (p.id == null) return;
        players[p.id] = {
            goals:   p.goals   || 0,
            cards:   p.cards   || "ninguna",
            injured: !!p.injured,
            status:  p.status,
            name:    p.name,
            number:  p.number,
            team:    p.team
        };
    });
    return {
        players,
        home: data.homeTeam?.score ?? 0,
        away: data.awayTeam?.score ?? 0
    };
}

// Compara el snapshot nuevo con el anterior y dispara alertas.
// matchId identifica el partido; matchData es el snapshot de Firestore.
function detectAndAlert(matchId, matchData, fromCache) {
    // Descartar snapshots de cache local desactualizada: cuando hay un cambio
    // pendiente de confirmar en el servidor, Firestore puede emitir primero un
    // snapshot fromCache que puede estar atrasado. No avisamos con datos de cache.
    if (fromCache) { return; }
    // Descartar snapshots no monotonicos: si este snapshot no es mas reciente
    // que el ultimo procesado para este partido, ignorarlo (evita re-disparar
    // alertas tras reconexiones o reenvios de Firestore).
    const ts = (typeof matchData.updatedAt?.toMillis === 'function')
        ? matchData.updatedAt.toMillis()
        : (typeof matchData.updatedAt?.toDate === 'function')
            ? matchData.updatedAt.toDate().getTime()
            : 0;
    const prevTs = _matchLastTs[matchId] || 0;
    if (ts && prevTs && ts <= prevTs) return;
    if (ts) _matchLastTs[matchId] = ts;

    const next = _buildState(matchData);
    const prev = _matchPrevState[matchId];
    _matchPrevState[matchId] = next;

    // La primera vez que vemos un partido NO avisamos del estado preexistente.
    if (!prev || !_matchSeeded[matchId]) { _matchSeeded[matchId] = true; return; }
    if (matchData.status !== "active") return; // solo partidos en vivo

    const matchLabel = (matchData.homeTeam?.name || "Local") + " vs " + (matchData.awayTeam?.name || "Visitante");
    const subPending = []; // jugadores que pasaron a banquillo (posible "sale")
    const subIn      = []; // jugadores que entraron al campo
    // Goles ya atribuidos a un jugador concreto en ESTE recorrido, por equipo.
    // Sirve para restar del delta del marcador agregado (home/away en el estado,
    // derivado de homeTeam.score / awayTeam.score) los goles que ya provocaron
    // su propio showEventToast, y así NO duplicar la alerta cuando el gol SÍ es
    // de un jugador con plantilla. El resto del delta no explicado por jugadores
    // son goles "sin jugador" (equipo rival sin plantilla, o gol no asignado /
    // propia puerta del equipo propio) que el bucle por jugador no detecta.
    let playerGoalsHome = 0;
    let playerGoalsAway = 0;

    Object.keys(next.players).forEach(id => {
        const np = next.players[id];
        const pp = prev.players[id];
        if (!pp) return;
        const who = "#" + (np.number ?? "?") + " " + (np.name || "Jugador");

        // GOL — los goles del jugador aumentaron
        if (np.goals > pp.goals) {
            const n = np.goals - pp.goals;
            if (np.team === "away") playerGoalsAway += n; else playerGoalsHome += n;
            showEventToast("goal", "¡GOL! " + who, matchLabel + (n > 1 ? " · +" + n : ""));
        }
        // TARJETAS — cambio de estado de tarjeta
        if (np.cards !== pp.cards) {
            if (np.cards === "amarilla" && pp.cards !== "amarilla")
                showEventToast("yellow", "Amarilla · " + who, matchLabel);
            else if (np.cards === "roja" && pp.cards !== "roja")
                showEventToast("red", "Roja · " + who, matchLabel);
        }
        // LESIÓN — pasó a lesionado
        if (np.injured && !pp.injured) {
            showEventToast("injury", "Lesión · " + who, matchLabel);
        }
        // CAMBIO — transiciones field<->bench (no por expulsión roja)
        if (np.status !== pp.status && np.cards !== "roja" && pp.cards !== "roja") {
            if (pp.status === "field" && np.status === "bench") subPending.push(who);
            else if (pp.status === "bench" && np.status === "field") subIn.push(who);
        }
    });

    // GOL SIN JUGADOR ASOCIADO — marcador agregado.
    // El bucle anterior solo detecta goles cuando el campo `goals` de un jugador
    // del array aumenta. Los goles registrados vía window._cronosExtraGoals
    // (equipo rival SIN plantilla cargada, o "gol no asignado / propia puerta"
    // del equipo propio) suben homeTeam.score / awayTeam.score en Firestore pero
    // NO incrementan el `goals` de ningún jugador, por lo que el bucle no los ve.
    // Aquí comparamos el delta REAL del marcador agregado (next.home/next.away,
    // derivado de homeTeam.score/awayTeam.score en _buildState) y restamos los
    // goles que YA fueron atribuidos a un jugador en este mismo ciclo
    // (playerGoalsHome / playerGoalsAway) para no duplicar la alerta del gol
    // propio. El remanente no explicado son goles sin jugador → una alerta por
    // cada uno, con el NOMBRE REAL del equipo configurado.
    const homeName = matchData.homeTeam?.name || "Local";
    const awayName = matchData.awayTeam?.name || "Visitante";
    const deltaHome = (next.home || 0) - (prev.home || 0);
    const deltaAway = (next.away || 0) - (prev.away || 0);
    // Solo deltas POSITIVOS no explicados por jugadores → goles. Un gol anulado
    // (delta negativo) o un marcador que no cambia no dispara nada. Si el delta
    // queda totalmente explicado por goles de jugador, el remanente es 0.
    const extraHome = Math.max(0, deltaHome - playerGoalsHome);
    const extraAway = Math.max(0, deltaAway - playerGoalsAway);
    for (let i = 0; i < extraHome; i++) {
        showEventToast("goal", "¡GOL! " + homeName, matchLabel);
    }
    for (let i = 0; i < extraAway; i++) {
        showEventToast("goal", "¡GOL! " + awayName, matchLabel);
    }

    // Sustituciones: emparejar entradas/salidas en un único aviso si es posible.
    if (subIn.length || subPending.length) {
        const pairs = Math.max(subIn.length, subPending.length);
        for (let i = 0; i < pairs; i++) {
            const inP  = subIn[i];
            const outP = subPending[i];
            let line = "Cambio";
            if (inP && outP) line = "Cambio · ▲ " + inP + "  ▼ " + outP;
            else if (inP)    line = "Entra · " + inP;
            else if (outP)   line = "Sale · " + outP;
            showEventToast("sub", line, matchLabel);
        }
    }
}


async function checkUserAccess(user) {
    const errEl = document.getElementById('auth-error');
    try {
        const snap = await getDoc(doc(db, 'users', user.uid));
        if (!snap.exists()) { errEl.textContent = 'Usuario no registrado.'; await signOut(auth); return; }
        userData = { uid: user.uid, ...snap.data() };
        if (!userData.isAuthorized) { errEl.textContent = 'Cuenta pendiente de autorización.'; await signOut(auth); return; }
        
        // Roles con acceso: superadmin, admin, club_admin, director, coordinator, user, parent
        const AUTHORIZED_ROLES = ['superadmin', 'admin', 'club_admin', 'director', 'coordinator', 'user', 'parent'];
        if (!AUTHORIZED_ROLES.includes(userData.role)) {
            errEl.textContent = 'No tienes permiso para ver partidos en vivo. Contacta con el administrador.';
            await signOut(auth); return;
        }
        
        // Access granted
        console.log("[LIVE] checkUserAccess: OK, role=" + userData.role);
        document.getElementById('auth-overlay').style.display = 'none';
        document.getElementById('live-header').style.display  = 'flex';

        enterLiveView();
    } catch(e) {
        errEl.textContent = 'Error de conexión: ' + e.message;
    }
}

// ── Vigilancia en segundo plano de TODOS los partidos seguidos ─────
// Suscribe un onSnapshot a cada partido en vivo que el usuario puede
// seguir, de modo que las alertas (gol/tarjeta/cambio/lesión) suenen
// en cualquier partido aunque el director esté viendo otro o la lista.
const _bgWatchers = {};   // matchId -> unsubscribe
let _bgPollTimer = null;

function _userCanFollow(m) {
    if (!m || m.status !== "active") return false;
    const isSA = (userData.role === "superadmin" || userData.role === "admin");
    if (isSA) {
        if (window._saClubFilter) return m.clubId === window._saClubFilter;
        return true;
    }
    if (userData.clubId && m.clubId === userData.clubId) return true;
    if (m.createdBy && m.createdBy === userData.uid) return true;
    if (m.coachEmail && userData.email && m.coachEmail.toLowerCase() === userData.email.toLowerCase()) return true;
    return false;
}

async function refreshBackgroundWatchers() {
    try {
        const snap = await getDocs(collection(db, "live_matches"));
        const activeIds = new Set();
        snap.forEach(d => {
            const m = { id: d.id, ...d.data() };
            if (!_userCanFollow(m)) return;
            activeIds.add(m.id);
            if (_bgWatchers[m.id]) return; // ya suscrito
            _bgWatchers[m.id] = onSnapshot(doc(db, "live_matches", m.id), (s2) => {
                if (!s2.exists()) return;
                const data = s2.data();
                // El partido que se esta viendo lo procesa EXCLUSIVAMENTE el
                // listener de loadMatch (via detectAndAlert -> renderMatch). El
                // watcher de fondo se desentiende por completo de ese partido para
                // no competir por _matchPrevState (evita falsos negativos por orden
                // de callbacks no determinista entre ambos listeners).
                if (m.id === currentMatchId) return;
                detectAndAlert(m.id, data, s2.metadata && s2.metadata.fromCache);
            }, () => {});
        });
        // Cancelar suscripciones de partidos que ya no están activos/seguidos.
        Object.keys(_bgWatchers).forEach(id => {
            if (!activeIds.has(id)) {
                try { _bgWatchers[id](); } catch(e){}
                delete _bgWatchers[id];
                delete _matchPrevState[id];
                delete _matchSeeded[id];
                delete _matchLastTs[id];
            }
        });
    } catch(e) { console.warn("[LIVE] refreshBackgroundWatchers:", e.message); }
}

function startBackgroundWatch() {
    if (_bgPollTimer) return;
    refreshBackgroundWatchers();
    // Reevaluar la lista de partidos seguidos periódicamente (altas/bajas).
    _bgPollTimer = setInterval(refreshBackgroundWatchers, 30000);
}

// ── Enter live view ────────────────────────────────────────────────
async function enterLiveView() {
    _initMuteBtn();
    _refreshSoundBtn();
    // Re-evaluar el estado del boton tras cada cambio de visibilidad/estado.
    if (_audioCtx) { try { _audioCtx.onstatechange = _refreshSoundBtn; } catch(e){} }
    startBackgroundWatch();
    if (urlMatchId) {

        loadMatch(urlMatchId);

}

// ── Load a specific match (real-time listener) ─────────────────────
window.loadMatch = function(matchId) {
    currentMatchId = matchId;
    showLoadingScreen('Conectando al partido…');

    // El listener visible RECLAMA este partido: resetea de forma SINCRONA el
    // estado de seeding/monotonia para este matchId, descartando cualquier valor
    // que el watcher de fondo (startBackgroundWatch) hubiera tocado durante la
    // ventana en que currentMatchId aun no estaba fijado. Asi el primer snapshot
    // que reciba este onSnapshot vuelve a sembrar limpio (sin avisar del estado
    // preexistente) y el listener visible queda como dueno unico de la deteccion
    // de eventos para este partido. Estos delete corren ANTES de registrar el
    // onSnapshot de abajo y, como Firestore entrega callbacks en un turno de
    // event loop posterior, ningun snapshot puede colarse entre medias.
    delete _matchSeeded[matchId];
    delete _matchLastTs[matchId];
    delete _matchPrevState[matchId];

    if (unsubscribeMatch) unsubscribeMatch();

    unsubscribeMatch = onSnapshot(
        doc(db, 'live_matches', matchId),
        (snap) => {
            if (!snap.exists()) {
                showLoadingScreen('Partido no encontrado.');
                return;
            }
            const data = snap.data();
            lastSnapshot = data;
            detectAndAlert(matchId, data, snap.metadata && snap.metadata.fromCache);
            renderMatch(data);
        },
        (err) => {
            showLoadingScreen('Error al conectar: ' + err.message);
        }
    );
};

// ── Render match data ──────────────────────────────────────────────
function renderMatch(data) {
    // Show match UI
    document.getElementById('loading-screen').style.display  = 'none';
    document.getElementById('scoreboard').style.display      = 'flex';
    document.getElementById('live-main').style.display       = 'flex';
    document.getElementById('history-view').style.display    = 'none';

    const isLive = data.status === 'active';

    // Badge
    document.getElementById('badge-text').textContent   = isLive ? 'EN VIVO' : 'FINALIZADO';
    document.getElementById('live-dot').style.display   = isLive ? 'block' : 'none';
    document.getElementById('last-update').textContent  =
        data.updatedAt?.toDate
            ? '↻ ' + data.updatedAt.toDate().toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit', second:'2-digit'})
            : '';

    // Scoreboard
    document.getElementById('sb-home-name').textContent  = data.homeTeam?.name  || 'LOCAL';
    document.getElementById('sb-away-name').textContent  = data.awayTeam?.name  || 'VISITANTE';
    document.getElementById('sb-home-score').textContent = data.homeTeam?.score ?? 0;
    document.getElementById('sb-away-score').textContent = data.awayTeam?.score ?? 0;
    document.getElementById('live-mode').textContent     =
        data.mode === 'f7' ? 'Fútbol 7' : 'Fútbol 11';

    // Phase label
    const phaseLabel = data.phase === '2nd_half' ? '2ª PARTE'
                     : data.phase === 'break'     ? 'DESCANSO'
                     : data.phase === 'halftime'  ? 'DESCANSO'
                     : data.phase === 'finished'  ? 'FINALIZADO'
                     : '1ª PARTE';
    document.getElementById('live-phase').textContent = phaseLabel;
    window._livePhase = data.phase || '1st_half';

    // ── TIMER — Sincronización con el servidor ─────────────────────
    // Cada snapshot de Firestore (cada ~5s) llega como un onSnapshot.
    // Guardamos la base {serverSecs, wallClock} y el intervalo de 250ms
    // añade (now - wallClock) para una cuenta continua sin saltos.
    // Cuando isRunning=false el display queda fijo en el tiempo del snapshot.

    const phase   = data.phase  || '1st_half';
    // Usar siempre las duraciones reales del snapshot (NO hardcoded)
    const defaultMaxTime = data.mode === 'f7' ? 30 * 60 : 40 * 60;
    const maxTime = phase === '2nd_half'
        ? (data.half2MaxTime || defaultMaxTime)
        : (data.half1MaxTime || defaultMaxTime);
    const timeH1  = data.timeH1 || 0;
    const timeH2  = data.timeH2 || 0;
    let serverSecs = (phase === '2nd_half') ? timeH2 : timeH1;

    // Tope de descuento por modalidad: F7 = 10 min, F11 = 15 min.
    // El partido autofinaliza la parte al alcanzar maxTime + maxAddedSecs.
    const maxAddedSecs = (data.mode === 'f7') ? 600 : 900;
    const phaseLimit   = maxTime + maxAddedSecs;

    // ── MODO AUTÓNOMO ──────────────────────────────────────────────
    // Si el snapshot trae phaseStartedAt (epoch ms del inicio de la parte),
    // el tiempo se deriva del reloj absoluto y NO depende de que el
    // entrenador siga emitiendo snapshots: funciona aunque cierre la app.
    let autonomous = false;
    if (data.isRunning && data.phaseStartedAt && (phase === '1st_half' || phase === '2nd_half')) {
        const startedMs = (typeof data.phaseStartedAt.toMillis === 'function')
            ? data.phaseStartedAt.toMillis()
            : (typeof data.phaseStartedAt.toDate === 'function')
                ? data.phaseStartedAt.toDate().getTime()
                : Number(data.phaseStartedAt);
        if (startedMs > 0) {
            autonomous = true;
            const elapsed = Math.max(0, Math.floor((Date.now() - startedMs) / 1000));
            serverSecs = Math.min(elapsed, phaseLimit);
            // Si el tiempo autónomo alcanzó el tope de descuento, la parte se
            // considera agotada aunque el entrenador (ausente) no haya marcado
            // la transición. Etiqueta de espectador: 1ª parte -> DESCANSO,
            // 2ª parte -> FIN DE PARTIDO. (Solo presentación: no escribe en Firestore.)
            if (elapsed >= phaseLimit) {
                document.getElementById('live-phase').textContent =
                    (phase === '2nd_half') ? 'FIN DE PARTIDO' : 'DESCANSO';
            }
        }
    }

    // Si el partido está corriendo, compensar el tiempo transcurrido
    // desde que el servidor guardó el snapshot hasta ahora.
    // FALLBACK: solo si NO hay phaseStartedAt (snapshots antiguos).
    if (!autonomous && data.isRunning && data.updatedAt && (phase === '1st_half' || phase === '2nd_half')) {
        let serverTimeMs = 0;
        if (typeof data.updatedAt.toMillis === 'function') {
            serverTimeMs = data.updatedAt.toMillis();
        } else if (typeof data.updatedAt.toDate === 'function') {
            serverTimeMs = data.updatedAt.toDate().getTime();
        } else {
            serverTimeMs = new Date(data.updatedAt).getTime();
        }
        if (serverTimeMs > 0) {
            const elapsed = Math.max(0, Math.floor((Date.now() - serverTimeMs) / 1000));
            const remaining = Math.max(0, phaseLimit - serverSecs);
            const delta = Math.min(elapsed, remaining);
            serverSecs += delta;
            // Actualizar tiempos de jugadores con el delta
            if (delta > 0 && Array.isArray(data.players)) {
                data.players = data.players.map(p => ({
                    ...p,
                    time: p.status === 'field' ? (p.time || 0) + delta : (p.time || 0)
                }));
            }
        }
    }

    // Actualizar base con datos del servidor
    window._timerBase = {
        secs:      serverSecs,
        wallClock: Date.now(),
        maxTime:   maxTime,
        phase:     phase,
        isLive:    isLive,
        isRunning: !!(data.isRunning),
        phaseLimit:     phaseLimit,
        autonomous:     autonomous,
        phaseStartedMs: autonomous
            ? ((typeof data.phaseStartedAt.toMillis === 'function')
                ? data.phaseStartedAt.toMillis()
                : (typeof data.phaseStartedAt.toDate === 'function')
                    ? data.phaseStartedAt.toDate().getTime()
                    : Number(data.phaseStartedAt))
            : 0
    };

    // Mostrar tiempo inmediatamente
    updateTimerDisplay(serverSecs, maxTime, phase);

    // Arrancar el intervalo UNA SOLA VEZ
    if (!timerInterval) {
        timerInterval = setInterval(() => {
            const b = window._timerBase;
            if (!b) return;
            if (!b.isRunning || !b.isLive ||
                b.phase === 'break' || b.phase === 'halftime' || b.phase === 'finished') {
                // Partido pausado o en descanso: mostrar el tiempo fijo del snapshot
                updateTimerDisplay(b.secs, b.maxTime, b.phase);
                return;
            }
            // Modo autónomo: derivar del epoch absoluto; topado en phaseLimit.
            let current, elapsed;
            if (b.autonomous && b.phaseStartedMs > 0) {
                current = Math.min(Math.floor((Date.now() - b.phaseStartedMs) / 1000), b.phaseLimit);
                elapsed = (Date.now() - b.wallClock) / 1000;
            } else {
                elapsed = (Date.now() - b.wallClock) / 1000;
                current = Math.min(Math.floor(b.secs + elapsed), b.phaseLimit);
            }
            updateTimerDisplay(current, b.maxTime, b.phase);
            tickPlayerTimes(elapsed);
        }, 250);
    }

    // Field & bench
    renderField(data);
    renderBench(data);
}

function getTimerColor(timeSec, halfMaxTime) {
    // timeSec es el tiempo transcurrido en la parte actual; halfMaxTime es la
    // duración reglamentaria de esa parte. Color por tiempo RESTANTE de la parte:
    // verde al principio, ámbar a mitad, rojo cuando queda poco.
    const maxSec = halfMaxTime || window._liveMaxTime || 1800;
    const remaining = Math.max(0, maxSec - timeSec);
    if (remaining > maxSec / 2) return '#2ea043'; // > 50% restante → verde
    if (remaining > maxSec / 4) return '#e3b341'; // 25-50% restante → ámbar
    return '#da3633';                              // < 25% restante → rojo
}

function updateTimerDisplay(secs, maxTime, phase) {
    // Misma lógica que la app: cuenta atrás hasta 0, luego tiempo añadido
    maxTime = maxTime || window._liveMaxTime || (30 * 60);
    phase   = phase   || window._livePhase   || '1st_half';

    let display;
    const isBreak    = phase === 'break' || phase === 'halftime';
    const isFinished = phase === 'finished';

    if (isBreak || isFinished) {
        // Descanso o fin: mostrar 0:00
        display = 0;
    } else if (secs <= maxTime) {
        // Cuenta atrás normal: maxTime - elapsed
        display = maxTime - secs;
    } else {
        // Tiempo añadido: secs - maxTime (cuenta hacia adelante desde 0)
        display = secs - maxTime;
    }

    const added   = secs > maxTime && !isBreak && !isFinished;
    const timerEl = document.getElementById('live-timer');
    const m = Math.floor(display / 60).toString().padStart(2, '0');
    const s = (display % 60).toString().padStart(2, '0');
    timerEl.textContent = (added ? '+' : '') + m + ':' + s;
    timerEl.style.color = added ? '#f0883e' : getTimerColor(secs, maxTime);
}

function formatTime(secs) {
    const m = Math.floor(secs / 60).toString().padStart(2, '0');
    const s = (secs % 60).toString().padStart(2, '0');
    return `${m}:${s}`;
}

function tickPlayerTimes(elapsed) {
    const els = document.querySelectorAll('.live-player-time[data-base-time]');
    els.forEach(el => {
        const base = parseInt(el.getAttribute('data-base-time')) || 0;
        el.textContent = formatTime(Math.floor(base + elapsed));
    });
}

// ── Sanitización XSS ────────────────────────────────────────────────
// Escapa texto para inserción segura en innerHTML (datos de Firestore
// controlables por el entrenador: nombres de equipo/jugador, email...).
function escapeHtml(value) {
    if (value == null) return '';
    return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}
// Valida un color CSS (hex #rgb/#rrggbb, rgb()/rgba(), o nombre simple).
// Si no es válido devuelve el fallback (evita CSS/atributo injection).
function safeColor(value, fallback) {
    if (typeof value === 'string' &&
        /^(#[0-9a-fA-F]{3,8}|rgb\(\s*[\d.]+\s*,\s*[\d.]+\s*,\s*[\d.]+\s*\)|rgba\(\s*[\d.]+\s*,\s*[\d.]+\s*,\s*[\d.]+\s*,\s*[\d.]+\s*\)|[a-zA-Z]{1,20})$/.test(value.trim())) {
        return value.trim();
    }
    return fallback;
}

// ── Render field ───────────────────────────────────────────────────
function renderField(data) {
    const pitch   = document.getElementById('live-pitch');
    const players = (data.players || []).filter(p => p.status === 'field');

    pitch.innerHTML = players.map(p => {
        const isHome = p.team === 'home';
        // FIX: usar color individual del jugador (incluido en snapshot) con fallback al color del equipo
        const color  = safeColor(p.color,     safeColor(isHome ? data.homeTeam?.color     : data.awayTeam?.color,     isHome ? '#58a6ff' : '#ff5858'));
        const shortsColor = safeColor(p.shortsColor, safeColor(isHome ? data.homeTeam?.shorts : data.awayTeam?.shorts, isHome ? '#1a4e99' : '#b22222'));
        const text   = safeColor(p.textColor, safeColor(isHome ? data.homeTeam?.textColor : data.awayTeam?.textColor, '#fff'));

        const goals     = p.goals  || 0;
        const hasGoal   = goals > 0;
        const hasYellow = p.cards === 'amarilla';
        const hasRed    = p.cards === 'roja';
        const isInjured = p.injured === true;
        let chipClass   = hasRed ? 'chip-red' : hasYellow ? 'chip-yellow' : hasGoal ? 'chip-goal' : '';
        if (isInjured) chipClass += ' chip-injured';
        const goalLabel = hasGoal ? `⚽×${goals}` : '';

        const xPct = Math.max(3, Math.min(97, p.x || 50));
        const yPct = Math.max(3, Math.min(97, p.y || 50));

        // Calcular color del timer según minutos jugados
        const half1Max = data.half1MaxTime || (data.mode === 'f7' ? 1800 : 2400);
        const half2Max = data.half2MaxTime || (data.mode === 'f7' ? 1800 : 2400);
        const totalSec = half1Max + half2Max;
        const timeSec = p.time || 0;
        let timerBg = '#da3633'; let timerText = '#ffffff';
        if (timeSec >= totalSec / 2) {
            timerBg = '#2ea043'; timerText = '#000000';
        } else if (timeSec >= totalSec / 3) {
            timerBg = '#e3b341'; timerText = '#000000';
        }

        return `<div class="live-player" style="left:${xPct}%;top:${yPct}%;">
            <div class="live-player-time" data-base-time="${timeSec}" style="background:${timerBg}; color:${timerText};">${formatTime(timeSec)}</div>
            <div class="live-player-chip ${chipClass}"
                 data-goal-label="${goalLabel}"
                 style="background:linear-gradient(to bottom, ${color} 50%, ${shortsColor} 50%);color:${text};">
                ${escapeHtml(p.number)}
            </div>
            <div class="live-player-label">${escapeHtml(p.name)}</div>
        </div>`;
    }).join('');
}

// ── Render bench ───────────────────────────────────────────────────
function renderBench(data) {
    const players = data.players || [];

    ['home', 'away'].forEach(team => {
        const containerId = team === 'home' ? 'bench-home' : 'bench-away';
        const container   = document.getElementById(containerId);
        const teamData    = team === 'home' ? data.homeTeam : data.awayTeam;
        const teamColor   = teamData?.color || (team === 'home' ? '#58a6ff' : '#ff5858');

        const benchPlayers = players
            .filter(p => p.team === team && p.status === 'bench')
            .sort((a, b) => (a.number || 0) - (b.number || 0));

        if (benchPlayers.length === 0) {
            container.innerHTML = '<p style="color:var(--muted);font-size:0.72rem;padding:0.3rem 0;">Sin suplentes</p>';
            return;
        }

        container.innerHTML = benchPlayers.map(p => {
            // FIX: usar color individual del jugador con fallback al color del equipo
            const color = safeColor(p.color, safeColor(teamColor, team === 'home' ? '#58a6ff' : '#ff5858'));
            const shortsColor = safeColor(p.shortsColor, safeColor(team === 'home' ? data.homeTeam?.shorts : data.awayTeam?.shorts, team === 'home' ? '#1a4e99' : '#b22222'));
            const cardIcon = p.cards === 'amarilla' ? ' 🟨' : p.cards === 'roja' ? ' 🟥' : '';
            const goalIcon = (p.goals || 0) > 0 ? ` ⚽×${p.goals}` : '';
            return `<div class="bench-player-row">
                <div class="bench-dot" style="background:linear-gradient(to bottom, ${color} 50%, ${shortsColor} 50%);color:#0a0e14;">${escapeHtml(p.number)}</div>
                <div class="bench-info">
                    <div class="bench-name">${escapeHtml(p.name)}${cardIcon}${goalIcon}${p.injured ? ' <span style="color:#e74c3c;font-size:0.7rem;">✚</span>' : ''}</div>
                </div>
                <div class="bench-time">${formatTime(p.time || 0)}</div>
            </div>`;
        }).join('');
    });
}

// ── Show history ───────────────────────────────────────────────────
