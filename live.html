            snap.forEach(d => { allDocs.push({ id: d.id, ...d.data() }); });
        // Ordenar cliente (sin índice Firestore)
        allDocs.sort((a,b) => (b.updatedAt?.toMillis?.() || 0) - (a.updatedAt?.toMillis?.() || 0));
        
        allDocs.forEach(m => { 
            if (m.status !== 'active') return;

            // Filtrado por jerarquía
            const isSA = (userData.role === 'superadmin' || userData.role === 'admin');

            if (isSA) {
                // Si hay filtro activo de club
                if (window._saClubFilter) {
                    if (m.clubId === window._saClubFilter) liveMatches.push(m);
                } else {
                    // Vista global: Ve todo
                    liveMatches.push(m);
                }
            } else if (userData.clubId && m.clubId === userData.clubId) {
                // Miembros del club (director/coordinador/padre/entrenador) ven
                // los partidos en vivo de su club.
                liveMatches.push(m);
            } else if (m.createdBy && m.createdBy === userData.uid) {
                // El propio entrenador que inició el partido siempre lo ve,
                // aunque el clubId aún no esté propagado.
                liveMatches.push(m);
            } else if (m.coachEmail && userData.email &&
                       m.coachEmail.toLowerCase() === userData.email.toLowerCase()) {
                // Backup para entrenadores sin clubId asignado formalmente.
                liveMatches.push(m);
            }
            // Partidos sin clubId (datos legacy/test) solo los ve superadmin/admin
            // arriba; no se exponen al resto por privacidad.
        });

        listEl.innerHTML = '';

        if (liveMatches.length === 0) {
            listEl.innerHTML = `
                <div style="text-align:center;padding:3rem 1rem;">
                    <div style="font-size:3rem;margin-bottom:1rem;">⚽</div>
                    <h3 style="color:var(--text);font-family:'Outfit',sans-serif;
                               margin-bottom:0.5rem;">No hay partidos en vivo</h3>
                    <p style="color:var(--muted);font-size:0.85rem;line-height:1.6;">
                        En cuanto un entrenador inicie un partido<br>
                        aparecerá aquí automáticamente.
                    </p>
                    <button onclick="showLiveNow()"
                        style="margin-top:1.5rem;padding:0.6rem 1.4rem;
                               background:rgba(88,166,255,0.15);
                               border:1px solid rgba(88,166,255,0.4);
                               border-radius:8px;color:var(--primary);
                               font-size:0.85rem;cursor:pointer;font-weight:700;">
                        🔄 Actualizar
                    </button>
                </div>`;
            return;
        }

        liveMatches.forEach(m => {
            const time = m.updatedAt?.toDate
                ? m.updatedAt.toDate().toLocaleTimeString('es-ES',
                    {hour:'2-digit', minute:'2-digit'})
                : '—';
            const homePlayers = (m.players||[]).filter(p=>p.team==='home'&&p.status==='field').length;
            const awayPlayers = (m.players||[]).filter(p=>p.team==='away'&&p.status==='field').length;
            const card = document.createElement('div');
            card.className = 'history-card';
            card.style.cssText =
                'border-color:rgba(255,88,88,0.4);' +
                'background:linear-gradient(135deg,rgba(255,88,88,0.08),rgba(255,88,88,0.03));' +
                'padding:1.2rem;';
            card.innerHTML = `
                <!-- Cabecera del partido -->
                <div style="display:flex;justify-content:space-between;
                            align-items:center;margin-bottom:0.8rem;">
                    <div style="display:flex;align-items:center;gap:0.5rem;">
                        <div style="width:8px;height:8px;border-radius:50%;
                                    background:#ff5858;flex-shrink:0;
                                    animation:pulse 1.5s ease-in-out infinite;"></div>
                        <span style="font-size:0.7rem;font-weight:700;
                                     color:#ff5858;letter-spacing:1px;">EN VIVO</span>
                    </div>
                    <span style="font-size:0.75rem;color:var(--muted);">
                        Actualizado ${time}
                    </span>
                </div>

                <!-- Marcador -->
                <div style="display:flex;align-items:center;
                            justify-content:center;gap:1.5rem;margin-bottom:0.8rem;">
                    <div style="text-align:center;flex:1;">
                        <div style="font-size:0.8rem;font-weight:700;
                                    color:var(--primary);letter-spacing:0.5px;
                                    margin-bottom:0.3rem;">
                            ${escapeHtml(m.homeTeam?.name||'LOCAL')}
                        </div>
                        <div style="font-family:'Outfit',sans-serif;
                                    font-size:2.2rem;font-weight:700;
                                    color:var(--text);line-height:1;">
                            ${m.homeTeam?.score??0}
                        </div>
                        <div style="font-size:0.7rem;color:var(--muted);margin-top:0.2rem;">
                            ${homePlayers} en campo
                        </div>
                    </div>
                    <!-- CRONÓMETRO NUEVO EN MEDIO -->
                    <div style="text-align:center; min-width: 70px;">
                        <div class="live-list-timer" data-match='${escapeHtml(JSON.stringify(m))}'
                             style="font-family:'Outfit',sans-serif; font-size:1.8rem; font-weight:700; color:var(--text);">
                            --:--
                        </div>
                        <div style="font-size:0.65rem;color:var(--muted); margin-top:0.3rem;">
                            ${m.mode==='f7'?'F7':'F11'}
                        </div>
                    </div>
                    <div style="text-align:center;flex:1;">
                        <div style="font-size:0.8rem;font-weight:700;
                                    color:var(--danger);letter-spacing:0.5px;
                                    margin-bottom:0.3rem;">
                            ${escapeHtml(m.awayTeam?.name||'VISITANTE')}
                        </div>
                        <div style="font-family:'Outfit',sans-serif;
                                    font-size:2.2rem;font-weight:700;
                                    color:var(--text);line-height:1;">
                            ${m.awayTeam?.score??0}
                        </div>
                        <div style="font-size:0.7rem;color:var(--muted);margin-top:0.2rem;">
                            ${awayPlayers} en campo
                        </div>
                    </div>
                </div>

                <!-- Entrenador + botón -->
                <div style="display:flex;justify-content:space-between;
                            align-items:center;border-top:1px solid rgba(255,255,255,0.07);
                            padding-top:0.7rem;">
                    <div style="font-size:0.72rem;color:var(--muted);">
                        ${(m.coachEmail && (userData.role === 'superadmin' || userData.role === 'admin')) ? '👨‍💼 ' + escapeHtml(m.coachEmail) : ''}
                    </div>
                    <button style="padding:0.55rem 1.2rem;background:#ff5858;
                                   border:none;border-radius:8px;color:#fff;
                                   font-weight:700;font-size:0.85rem;
                                   cursor:pointer;letter-spacing:0.5px;">
                        🔴 VER PARTIDO
                    </button>
                </div>`;

            card.onclick = () => {
                history.pushState({}, '', '?match=' + m.id);
                loadMatch(m.id);
            };
            listEl.appendChild(card);
        });

        }); // fin onSnapshot callback

        // Levantar el setInterval para los relojes de las tarjetas
        _liveListTimerInterval = setInterval(() => {
            document.querySelectorAll('.live-list-timer').forEach(el => {
                const m = JSON.parse(el.getAttribute('data-match') || '{}');
                const phase = m.phase || '1st_half';
                const isBreak = phase === 'break' || phase === 'halftime' || phase === 'finished';
                
                let secs = (phase === '2nd_half' ? m.timeH2 : m.timeH1) || 0;
                const maxTime = phase === '2nd_half' ? (m.half2MaxTime || (m.mode==='f7'?1800:2400)) : (m.half1MaxTime || (m.mode==='f7'?1800:2400));
                const phaseLimit = maxTime + (m.mode === 'f7' ? 600 : 900);

                if (m.isRunning && !isBreak) {
                    // Reutilizar matemática de modo autónomo
                    if (m.phaseStartedAt) {
                        const startedMs = typeof m.phaseStartedAt === 'object' && m.phaseStartedAt.seconds 
                                ? m.phaseStartedAt.seconds * 1000 
                                : Number(m.phaseStartedAt);
                        if (startedMs > 0) {
                            const elapsed = Math.max(0, Math.floor((Date.now() - startedMs) / 1000));
                            secs = Math.min(elapsed, phaseLimit);
                        }
                    } else if (m.updatedAt) {
                        const serverTimeMs = typeof m.updatedAt === 'object' && m.updatedAt.seconds
                                ? m.updatedAt.seconds * 1000
                                : new Date(m.updatedAt).getTime();
                        if (serverTimeMs > 0) {
                            const elapsed = Math.max(0, Math.floor((Date.now() - serverTimeMs) / 1000));
                            const remaining = Math.max(0, phaseLimit - secs);
                            secs += Math.min(elapsed, remaining);
                        }
                    }
                }
                
                // Lógica de mostrar añadido (+)
                let display = isBreak ? 0 : (secs <= maxTime ? (maxTime - secs) : (secs - maxTime));
                const min = Math.floor(display / 60).toString().padStart(2, '0');
                const sec = (display % 60).toString().padStart(2, '0');
                const isAdded = secs > maxTime && !isBreak;
                
                el.textContent = (isAdded ? '+' : '') + min + ':' + sec;
                el.style.color = isAdded ? '#f0883e' : (secs < maxTime/2 ? '#2ea043' : '#e3b341'); // Mismos colores que renderMatch
            });
        }, 1000);

    } catch(err) {
        console.error('[LIVE] showLiveNow ERROR:', err);
        listEl.innerHTML = `<div style="text-align:center;padding:2rem;"><p style="color:#ff5858;font-size:1rem;font-weight:700;margin-bottom:0.5rem;">⚠️ Error al cargar</p><p style="color:#ff5858;font-size:0.85rem;">${err.message}</p><p style="color:var(--muted);font-size:0.75rem;margin-top:0.5rem;">Comprueba la conexión y vuelve a intentarlo</p><button onclick="showLiveNow()" style="margin-top:1rem;padding:0.6rem 1.4rem;background:rgba(255,88,88,0.2);border:1px solid rgba(255,88,88,0.5);border-radius:8px;color:#ff5858;cursor:pointer;font-weight:700;">🔄 Reintentar</button></div>`;
    }
};

// ── Navegación entre partidos ─────────────────────────────────────
let _matchList = [];      // lista cacheada de todos los partidos (24h)
let _matchListIdx = -1;   // posición actual en la lista

window.navigateMatch = function(dir) {
    if (_matchList.length === 0) return;
    _matchListIdx = Math.max(0, Math.min(_matchList.length - 1, _matchListIdx + dir));
    const m = _matchList[_matchListIdx];
    if (m) {
        history.pushState({}, '', '?match=' + m.id);
        loadMatch(m.id);
        updateNavButtons();
    }
};

function updateNavButtons() {
    const nav = document.getElementById('btn-match-nav');
    if (!nav) return;
    nav.style.display = _matchList.length > 1 ? 'flex' : 'none';
}

function setMatchListContext(matches, currentId) {
    _matchList = matches;
    _matchListIdx = matches.findIndex(m => m.id === currentId);
    if (_matchListIdx === -1) _matchListIdx = 0;
    updateNavButtons();
}

window.toggleKeepMatch = async function(matchId, e) {
    if (e) e.stopPropagation();
    try {
        const { doc, updateDoc } = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js');
        const matchData = window._allFetchedMatches?.find(m => m.id === matchId);
        const newKeep = matchData ? !matchData.keep : true;
        await updateDoc(doc(db, 'live_matches', matchId), { keep: newKeep });
        if (matchData) matchData.keep = newKeep;
        showHistory(); // Refrescar vista
    } catch(err) {
        console.error(err);
        alert('Error al guardar: ' + err.message);
    }
};

window.deleteMatch = async function(matchId, e) {
    if (e) e.stopPropagation();
    if (!confirm('¿Eliminar definitivamente este partido del historial?')) return;
    try {
        const { doc, deleteDoc } = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js');
        await deleteDoc(doc(db, 'live_matches', matchId));
        showHistory(); // Refrescar vista
    } catch(err) {
        console.error(err);
        alert('Error al eliminar: ' + err.message);
    }
};

window.showHistory = async function() {
    clearInterval(timerInterval); timerInterval = null;
    window._prevPhase = null; // reset para resinc al volver
    document.getElementById('scoreboard').style.display   = 'none';
    document.getElementById('live-main').style.display    = 'none';
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('history-view').style.display = 'flex';
    document.getElementById('history-view').style.flexDirection = 'column';

    // Actualizar cabecera
    document.getElementById('history-header').innerHTML = `
        <h2 style="font-size:1.1rem;font-family:'Outfit',sans-serif;">
            📋 Historial de partidos
        </h2>
        <div style="display:flex;gap:0.5rem;align-items:center;">
            <button onclick="showLiveNow()"
                style="padding:0.4rem 0.9rem;background:rgba(255,88,88,0.15);
                       border:1px solid rgba(255,88,88,0.4);border-radius:6px;
                       color:#ff5858;font-size:0.8rem;font-weight:700;cursor:pointer;">
                🔴 EN VIVO
            </button>
            <button onclick="window.location.href='index.html'"
                style="padding:0.4rem 0.9rem;background:rgba(88,166,255,0.1);
                       border:1px solid rgba(88,166,255,0.3);border-radius:6px;
                       color:var(--primary);font-size:0.8rem;font-weight:700;cursor:pointer;">
                🏠 INICIO
            </button>
        </div>`;

    const listEl = document.getElementById('history-list');
    listEl.innerHTML = '<p style="color:var(--muted);text-align:center;margin-top:2rem;">⏳ Cargando…</p>';

    try {
        const q    = collection(db, 'live_matches');  // Sin orderBy
        const snap = await getDocs(q);

        if (snap.empty) {
            listEl.innerHTML = '<p style="color:var(--muted);text-align:center;margin-top:2rem;">No hay partidos registrados aún.</p>';
            return;
        }

        const twentyFourHoursAgo = new Date(Date.now() - 24 * 60 * 60 * 1000);

        // Separar: en vivo vs finalizados (y auto-borrar caducados)
        const liveMatches = [], finishedMatches = [];
        const allDocs2 = [];
        snap.forEach(d => { allDocs2.push({ id: d.id, ...d.data() }); });
        
        window._allFetchedMatches = allDocs2;
        
        // Ordenar cliente (sin índice Firestore)
        allDocs2.sort((a,b) => (b.updatedAt?.toMillis?.() || 0) - (a.updatedAt?.toMillis?.() || 0));
        
        const { doc, deleteDoc } = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js');
        
        allDocs2.forEach(m => {
            const updated = m.updatedAt?.toDate?.() || new Date(0);
            if (m.status === 'active') {
                liveMatches.push(m);
            } else {
                if (updated <= twentyFourHoursAgo && !m.keep) {
                    // Auto-borrar si tiene más de 24h y no está marcado como guardado
                    deleteDoc(doc(db, 'live_matches', m.id)).catch(err => console.warn('Error auto-borrado:', err));
                } else {
                    finishedMatches.push(m);
                }
            }
        });

        listEl.innerHTML = '';

        // ── EN VIVO ──────────────────────────────────────────
        if (liveMatches.length > 0) {
            const lh = document.createElement('div');
            lh.innerHTML = `<div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.6rem;">
                <div style="width:8px;height:8px;border-radius:50%;background:#ff5858;
                            animation:pulse 1.5s ease-in-out infinite;flex-shrink:0;"></div>
                <span style="font-size:0.7rem;font-weight:700;letter-spacing:1px;color:#ff5858;">
                    PARTIDOS EN VIVO AHORA
                </span></div>`;
            listEl.appendChild(lh);
            liveMatches.forEach(m => {
                const time = m.updatedAt?.toDate
                    ? m.updatedAt.toDate().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'})
                    : '—';
                const card = document.createElement('div');
                card.className = 'history-card';
                card.style.cssText = 'border-color:rgba(255,88,88,0.5);background:rgba(255,88,88,0.06);';
                card.innerHTML = `
                    <div class="history-card-top">
                        <div class="history-match" style="font-size:1rem;">
                            ${escapeHtml(m.homeTeam?.name||'LOCAL')} vs ${escapeHtml(m.awayTeam?.name||'VISITANTE')}
                        </div>
                        <div class="history-score" style="font-size:1.4rem;">
                            ${m.homeTeam?.score??0} – ${m.awayTeam?.score??0}
                        </div>
                    </div>
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:0.4rem;">
                        <div class="history-meta">
                            ${m.mode==='f7'?'Fútbol 7':'Fútbol 11'} · Actualizado: ${time}
                            ${(m.coachEmail && (userData.role==='superadmin' || userData.role==='admin'))?'<br>Entrenador: '+escapeHtml(m.coachEmail):''}
                        </div>
                        <button style="padding:0.5rem 1rem;background:#ff5858;border:none;
                                       border-radius:8px;color:#fff;font-weight:700;
                                       font-size:0.82rem;cursor:pointer;white-space:nowrap;">
                            🔴 VER EN VIVO
                        </button>
                    </div>`;
                card.onclick = () => { history.pushState({},'','?match='+m.id); setMatchListContext(finishedMatches.length ? [...liveMatches,...finishedMatches] : [m], m.id); loadMatch(m.id); };
                listEl.appendChild(card);
            });
        } else {
            const noLive = document.createElement('div');
            noLive.style.cssText =
                'background:rgba(255,255,255,0.03);border:1px solid var(--border);' +
                'border-radius:10px;padding:1rem;text-align:center;margin-bottom:1rem;';
            noLive.innerHTML =
                '<p style="color:var(--muted);font-size:0.85rem;">No hay partidos en vivo en este momento.</p>' +
                '<p style="color:var(--muted);font-size:0.75rem;margin-top:0.3rem;">Cuando un entrenador inicie un partido aparecerá aquí automáticamente.</p>';
            listEl.appendChild(noLive);
        }

        // ── HISTORIAL ────────────────────────────────────────
        if (finishedMatches.length > 0) {
            const hh = document.createElement('div');
            hh.style.cssText = 'margin:1rem 0 0.6rem;';
            hh.innerHTML = '<span style="font-size:0.7rem;font-weight:700;letter-spacing:1px;color:var(--muted);">PARTIDOS FINALIZADOS</span>';
            listEl.appendChild(hh);
            finishedMatches.forEach(m => {
                const date = m.updatedAt?.toDate
                    ? m.updatedAt.toDate().toLocaleDateString('es-ES',
                        {day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'})
                    : '—';
                const card = document.createElement('div');
                card.className = 'history-card';
                card.innerHTML = `
                    <div class="history-card-top">
                        <div class="history-match">
                            ${escapeHtml(m.homeTeam?.name||'LOCAL')} vs ${escapeHtml(m.awayTeam?.name||'VISITANTE')}
                        </div>
                        <div class="history-score">
                            ${m.homeTeam?.score??0} – ${m.awayTeam?.score??0}
                        </div>
                    </div>
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:0.3rem;">
                        <div class="history-meta">
                            ${m.mode==='f7'?'Fútbol 7':'Fútbol 11'} · ${date}
                            ${(m.coachEmail && (userData.role==='superadmin' || userData.role==='admin'))?'<br>Entrenador: '+escapeHtml(m.coachEmail):''}
                        </div>
                        <div style="display:flex;gap:0.4rem;align-items:center;">
                            <button onclick="toggleKeepMatch('${m.id}', event)" title="${m.keep ? 'Dejar de guardar' : 'Guardar permanentemente'}"
                                style="padding:0.3rem 0.6rem;background:${m.keep ? 'rgba(63,185,80,0.15)' : 'rgba(255,255,255,0.05)'};
                                       border:1px solid ${m.keep ? 'rgba(63,185,80,0.4)' : 'var(--border)'};border-radius:6px;
                                       color:${m.keep ? '#3fb950' : 'var(--muted)'};font-size:0.75rem;cursor:pointer;font-weight:600;">
                                ${m.keep ? '★ Guardado' : '☆ Guardar'}
                            </button>
                            <button onclick="deleteMatch('${m.id}', event)"
                                style="padding:0.3rem 0.6rem;background:rgba(255,88,88,0.1);
                                       border:1px solid rgba(255,88,88,0.3);border-radius:6px;
                                       color:#ff5858;font-size:0.75rem;cursor:pointer;">
                                🗑️ Eliminar
                            </button>
                        </div>
                    </div>`;
                card.onclick = () => { history.pushState({},'','?match='+m.id); setMatchListContext(finishedMatches.length ? [...liveMatches,...finishedMatches] : [m], m.id); loadMatch(m.id); };
                listEl.appendChild(card);
            });
        }

    } catch(err) {
        listEl.innerHTML = `<p style="color:var(--danger);text-align:center;margin-top:2rem;">Error: ${err.message}</p>`;
    }
};

window.showLive = function() { showLiveNow(); }; window._showLive_old = function() {
    document.getElementById('history-view').style.display = 'none';
    if (currentMatchId) loadMatch(currentMatchId);
    else showLiveNow();
};

// ── Helpers ────────────────────────────────────────────────────────
function showLoadingScreen(msg) {
    document.getElementById('scoreboard').style.display      = 'none';
    document.getElementById('live-main').style.display       = 'none';
    document.getElementById('history-view').style.display    = 'none';
    document.getElementById('loading-screen').style.display  = 'flex';
    document.getElementById('loading-msg').textContent       = msg;
}
</script>
