<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Chronos Fútbol - Live View</title>
    <meta name="theme-color" content="#0a0e14">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Outfit:wght@600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg:         #0a0e14;
            --surface:    #0d1117;
            --glass:      rgba(255,255,255,0.05);
            --border:     rgba(255,255,255,0.1);
            --primary:    #58a6ff;
            --secondary:  #f0883e;
            --success:    #3fb950;
            --danger:     #ff5858;
            --text:       #cdd9e5;
            --muted:      #7d8590;
        }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh; display: flex; flex-direction: column;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        /* ── AUTH OVERLAY ── */
        #auth-overlay {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; align-items: center; justify-content: center;
            padding: 1rem; z-index: 999;
        }
        .auth-card {
            width: 100%; max-width: 360px;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 16px; padding: 2rem;
        }
        .auth-card h1 {
            font-family: 'Outfit', sans-serif; color: var(--primary);
            font-size: 1.5rem; text-align: center; margin-bottom: 0.2rem;
        }
        .auth-card p { color: var(--muted); font-size: 0.8rem; text-align: center; margin-bottom: 1.5rem; }
        .auth-input {
            width: 100%; padding: 0.75rem;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px; color: white; font-size: 0.95rem;
            outline: none; margin-bottom: 0.8rem;
        }
        .auth-btn {
            width: 100%; padding: 0.9rem;
            background: var(--primary); border: none;
            border-radius: 8px; color: #0a0e14;
            font-weight: 700; font-size: 1rem; cursor: pointer;
        }
        #auth-error { color: var(--danger); font-size: 0.8rem; text-align: center; min-height: 1.2rem; margin-top: 0.6rem; }

        /* ── HEADER ── */
        #live-header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding-top: max(0.7rem, env(safe-area-inset-top));
            padding-left: max(1.2rem, env(safe-area-inset-left));
            padding-right: max(1.2rem, env(safe-area-inset-right));
            display: flex; align-items: center; justify-content: space-between;
            gap: 1rem; flex-wrap: wrap;
        }
        #live-header .logo {
            font-family: 'Outfit', sans-serif;
            color: var(--primary); font-size: 0.95rem; font-weight: 700;
            display: flex; align-items: center; gap: 0.4rem;
        }
        #live-header .logo span { color: var(--secondary); }
        #live-badge {
            display: flex; align-items: center; gap: 0.4rem;
            background: rgba(255,88,88,0.15);
            border: 1px solid rgba(255,88,88,0.4);
            border-radius: 20px; padding: 3px 12px;
            font-size: 0.72rem; font-weight: 700; color: #ff5858;
        }
        #live-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: #ff5858;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
        #last-update { color: var(--muted); font-size: 0.7rem; }
        #btn-history {
            padding: 0.4rem 0.9rem;
            background: var(--glass); border: 1px solid var(--border);
            border-radius: 6px; color: var(--muted);
            font-size: 0.75rem; cursor: pointer;
        }

        /* ── SCOREBOARD ── */
        #scoreboard {
            background: linear-gradient(135deg, rgba(88,166,255,0.08), rgba(240,136,62,0.06));
            border-bottom: 1px solid var(--border);
            padding: 1rem 1.2rem;
            display: flex; align-items: center; justify-content: center;
            gap: 1.5rem; flex-wrap: wrap;
        }
        .team-score-block { text-align: center; }
        .team-score-name {
            font-size: 0.75rem; font-weight: 700;
            letter-spacing: 1px; color: var(--muted); margin-bottom: 0.2rem;
        }
        .team-score-num {
            font-family: 'Outfit', sans-serif;
            font-size: 2.8rem; font-weight: 700; line-height: 1;
        }
        .score-sep { font-size: 2rem; color: var(--muted); font-weight: 300; }
        .match-meta {
            display: flex; flex-direction: column; align-items: center; gap: 0.3rem;
        }
        #live-timer {
            font-family: 'Outfit', sans-serif;
            font-size: 1.6rem; font-weight: 700; color: var(--primary);
        }
        #live-phase {
            font-size: 0.7rem; color: var(--muted);
            background: var(--glass); border-radius: 4px;
            padding: 2px 8px; letter-spacing: 1px;
        }
        #live-mode { font-size: 0.72rem; color: var(--muted); }

        /* ── MAIN LAYOUT ── */
        #live-main {
            flex: 1; display: flex; gap: 0; overflow: hidden;
        }

        /* ── FIELD ── */
        #field-wrap {
            flex: 1; padding: 0.8rem;
            display: flex; align-items: center; justify-content: center;
            min-height: 0;
        }
        #live-pitch {
            width: 100%; max-width: 700px;
            aspect-ratio: 3/2;
            background:
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px),
                radial-gradient(ellipse 60% 40% at 50% 50%, rgba(255,255,255,0.04) 0%, transparent 70%),
                linear-gradient(160deg, #0d2818 0%, #0a1f10 50%, #0d2818 100%);
            background-size: 33.3% 50%, 33.3% 50%, 100% 100%, 100% 100%;
            border: 2px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            position: relative; overflow: hidden;
        }
        /* Field lines */
        #live-pitch::before {
            content: '';
            position: absolute; inset: 0;
            background:
                /* Center line */
                linear-gradient(90deg, transparent 49.5%, rgba(255,255,255,0.2) 49.5%, rgba(255,255,255,0.2) 50.5%, transparent 50.5%),
                /* Center circle */
                radial-gradient(circle 60px at 50% 50%, transparent 58px, rgba(255,255,255,0.2) 58px, rgba(255,255,255,0.2) 60px, transparent 60px),
                /* Left penalty area */
                linear-gradient(90deg, transparent 15%, rgba(255,255,255,0.12) 15%, rgba(255,255,255,0.12) 15.5%, transparent 15.5%),
                linear-gradient(0deg, transparent 25%, rgba(255,255,255,0.12) 25%, rgba(255,255,255,0.12) 25.5%, transparent 25.5%),
                linear-gradient(0deg, transparent 74.5%, rgba(255,255,255,0.12) 74.5%, rgba(255,255,255,0.12) 75%, transparent 75%),
                /* Right penalty area */
                linear-gradient(90deg, transparent 84.5%, rgba(255,255,255,0.12) 84.5%, rgba(255,255,255,0.12) 85%, transparent 85%);
            pointer-events: none;
        }
        /* ── FICHA DE JUGADOR (compacta: tiempo + ficha + nombre en fila) ──
           Antes: flex-direction: column → tiempo ARRIBA, ficha MEDIO, nombre ABAJO.
           La ficha de 42px con etiquetas a 68px hacía que dos fichas vecinas
           se solaparan (tiempo de una pisando nombre de otra).
           Ahora: fichas más pequeñas + etiquetas con max-width = ancho ficha,
           y opacidad reducida para no saturar visualmente. */
        .live-player {
            position: absolute;
            transform: translate(-50%, -50%);
            display: flex; flex-direction: column;
            align-items: center; gap: 1px;
            cursor: default;
            z-index: 10;
        }
        .live-player-chip {
            width: 30px; height: 30px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.62rem; font-weight: 800;
            border: 2px solid rgba(255,255,255,0.75);
            box-shadow: 0 2px 8px rgba(0,0,0,0.7),
                        0 0 0 1px rgba(0,0,0,0.4);
            position: relative;
        }
        .live-player-label {
            font-size: 0.5rem; font-weight: 700;
            background: rgba(0,0,0,0.82);
            color: #f5f0e8;
            border-radius: 3px;
            padding: 1px 3px;
            white-space: nowrap;
            max-width: 38px;
            overflow: hidden;
            text-overflow: ellipsis;
            letter-spacing: 0.2px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.8);
            line-height: 1.2;
        }
        .live-player-time {
            font-size: 0.48rem;
            font-weight: 700;
            color: #f5f0e8;
            background: rgba(0,0,0,0.75);
            border-radius: 2px;
            padding: 0px 3px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.9);
            line-height: 1.2;
            margin-bottom: 1px;
            white-space: nowrap;
        }
        /* chip-goal usa atributo data-goals para mostrar número */
        .chip-goal::after {
            content: attr(data-goal-label);
            position: absolute; top: -10px; right: -10px;
            font-size: 0.65rem; font-weight: 700;
            background: rgba(0,0,0,0.85);
            color: #fff; border-radius: 4px;
            padding: 1px 4px; white-space: nowrap;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .chip-yellow::after { content: '🟨'; position:absolute; bottom:-6px; right:-6px; font-size:0.75rem; z-index:35; }
        .chip-red::after    { content: '🟥'; position:absolute; bottom:-6px; right:-6px; font-size:0.75rem; z-index:35; }
        /* Indicador de lesión en live — lado izquierdo */
        .chip-injured::before {
            content: '✚';
            position: absolute; bottom: -6px; left: -6px;
            width: 15px; height: 15px; border-radius: 50%;
            background: #e74c3c; color: #fff;
            font-size: 0.55rem; font-weight: 700;
            display: flex; align-items: center; justify-content: center;
            border: 1.5px solid #fff;
        }

        /* ── BENCH PANEL ── */
        #bench-panel {
            width: 200px; flex-shrink: 0;
            background: var(--surface);
            border-left: 1px solid var(--border);
            overflow-y: auto; padding: 0.8rem;
        }
        .bench-section-title {
            font-size: 0.65rem; font-weight: 700; letter-spacing: 1px;
            color: var(--muted); margin-bottom: 0.5rem; margin-top: 0.8rem;
        }
        .bench-section-title:first-child { margin-top: 0; }
        .bench-player-row {
            display: flex; align-items: center; gap: 0.5rem;
            padding: 0.4rem 0.5rem; border-radius: 6px;
            background: var(--glass); margin-bottom: 4px;
        }
        .bench-dot {
            width: 20px; height: 20px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.6rem; font-weight: 700; flex-shrink: 0;
        }
        .bench-info { flex: 1; overflow: hidden; }
        .bench-name { font-size: 0.75rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .bench-num  { font-size: 0.65rem; color: var(--muted); }
        .bench-time { font-size: 0.65rem; font-weight: 700; text-align: center; border-radius: 3px; padding: 1px 5px; white-space: nowrap; }

        /* ── HISTORY VIEW ── */
        #history-view {
            display: none; flex: 1; flex-direction: column; overflow: hidden;
        }
        #history-header {
            padding: 1rem 1.2rem;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
        }
        #history-list {
            flex: 1; overflow-y: auto; padding: 1rem;
        }
        .history-card {
            background: var(--glass); border: 1px solid var(--border);
            border-radius: 10px; padding: 0.9rem 1rem;
            margin-bottom: 0.7rem; cursor: pointer;
            transition: border-color 0.2s;
        }
        .history-card:hover { border-color: var(--primary); }
        .history-card-top {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 0.3rem;
        }
        .history-match { font-weight: 700; font-size: 0.9rem; }
        .history-score {
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem; color: var(--primary); font-weight: 700;
        }
        .history-meta { font-size: 0.72rem; color: var(--muted); }
        .history-status-live   { color: #ff5858; font-size: 0.7rem; font-weight: 700; }
        .history-status-finish { color: var(--success); font-size: 0.7rem; }

        /* ── EMPTY / LOADING ── */
        #loading-screen {
            flex: 1; display: flex; align-items: center; justify-content: center;
            flex-direction: column; gap: 1rem;
        }
        #loading-screen p { color: var(--muted); font-size: 0.9rem; }
        .spinner { font-size: 2rem; animation: spin 1s linear infinite; }
        @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

        @media (max-width: 600px) {
            #bench-panel { display: none; }
            #live-header { padding: 0.5rem 0.8rem; }
        }

        /* ── ALERTAS DE EVENTO (sonoras + visuales) ──
           Posicionamiento responsive:
           - Desktop/tablet (>950px): top-right clásico
           - Móvil landscape: debajo del scoreboard, a la derecha
           - Móvil portrait: debajo del scoreboard, a la derecha
           Nunca dentro del campo ni tapados por la notch del móvil. */
        #event-toast-stack {
            position: fixed; top: 1rem; right: 1rem;
            z-index: 1200; display: flex; flex-direction: column;
            gap: 0.55rem; max-width: min(380px, 92vw);
            pointer-events: none;
        }
        /* En móvil, los toasts se reposicionan a la altura del marcador */
        @media (max-width: 950px) {
            #event-toast-stack {
                /* top dinámico: header + scoreboard + pequeño margen.
                   En portrait: header (~48px) + scoreboard (~50px) = ~100px
                   En landscape móvil: header (~47px) + scoreboard (~40px) = ~90px
                   Usamos calc con env(safe-area-inset-top) para evitar la notch. */
                top: calc(env(safe-area-inset-top, 0px) + 100px);
                right: 0.5rem;
                left: 0.5rem;
                max-width: none;
                align-items: flex-end;
            }
            .event-toast {
                max-width: min(340px, 92vw);
                padding: 0.5rem 0.7rem;
            }
            .event-toast .et-icon { font-size: 1.1rem; }
            .event-toast .et-title { font-size: 0.74rem; }
            .event-toast .et-sub { font-size: 0.65rem; }
        }
        .event-toast {
            pointer-events: auto;
            display: flex; align-items: center; gap: 0.7rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-left: 4px solid var(--primary);
            border-radius: 10px; padding: 0.7rem 0.9rem;
            box-shadow: 0 8px 28px rgba(0,0,0,0.55);
            animation: toastIn 0.35s cubic-bezier(.2,.9,.3,1.2),
                       toastPulse 1.1s ease-in-out 0.35s 2;
            cursor: pointer;
        }
        .event-toast.leaving { animation: toastOut 0.3s ease forwards; }
        .event-toast .et-icon { font-size: 1.5rem; flex-shrink: 0; line-height: 1; }
        .event-toast .et-body { flex: 1; min-width: 0; }
        .event-toast .et-title {
            font-weight: 800; font-size: 0.84rem; color: var(--text);
            display: flex; align-items: center; gap: 0.4rem;
        }
        .event-toast .et-sub {
            font-size: 0.72rem; color: var(--muted); margin-top: 1px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .event-toast.ev-goal     { border-left-color: #3fb950; }
        .event-toast.ev-yellow   { border-left-color: #e3b341; }
        .event-toast.ev-red      { border-left-color: #da3633; }
        .event-toast.ev-sub      { border-left-color: #58a6ff; }
        .event-toast.ev-injury   { border-left-color: #e74c3c; }
        @keyframes toastIn {
            from { transform: translateX(120%); opacity: 0; }
            to   { transform: translateX(0);    opacity: 1; }
        }
        @keyframes toastOut {
            from { transform: translateX(0);    opacity: 1; max-height: 100px; }
            to   { transform: translateX(120%); opacity: 0; max-height: 0; margin: 0; padding: 0; }
        }
        @keyframes toastPulse {
            0%,100% { box-shadow: 0 8px 28px rgba(0,0,0,0.55); }
            50%     { box-shadow: 0 8px 28px rgba(0,0,0,0.55), 0 0 0 4px rgba(255,255,255,0.06); }
        }
        #event-flash {
            position: fixed; inset: 0; z-index: 1100;
            pointer-events: none; opacity: 0;
            background: radial-gradient(circle at 50% 30%, rgba(63,185,80,0.18), transparent 70%);
        }
        #event-flash.fire { animation: flashFx 0.65s ease-out; }
        @keyframes flashFx { 0%{opacity:0} 15%{opacity:1} 100%{opacity:0} }
        #btn-mute {
            padding: 0.4rem 0.7rem; background: var(--glass);
            border: 1px solid var(--border); border-radius: 6px;
            color: var(--muted); font-size: 0.82rem; cursor: pointer;
        }
        #btn-mute.muted { color: var(--danger); border-color: rgba(255,88,88,0.4); }
        #btn-activate-sound {
            padding: 0.4rem 0.7rem; background: rgba(63,185,80,0.15);
            border: 1px solid rgba(63,185,80,0.5); border-radius: 6px;
            color: #3fb950; font-size: 0.82rem; cursor: pointer; font-weight: 700;
            animation: pulseSound 1.6s ease-in-out infinite;
        }
        #btn-activate-sound.ready { animation: none; background: var(--glass);
            border-color: var(--border); color: var(--muted); font-weight: 400; }
        @keyframes pulseSound {
            0%,100% { box-shadow: 0 0 0 0 rgba(63,185,80,0.4); }
            50%     { box-shadow: 0 0 0 6px rgba(63,185,80,0); }
        }

        /* paridad con style.css para orientación y pantallas cortas */

        /* ── LANDSCAPE MÓVIL: campo grande + banquillo lateral compacto ──
           Antes: #live-pitch { max-width: 60% } dejaba el campo limitado
           al 60% del ancho en landscape, con ~40% de espacio vacío a los
           lados y fichas amontonadas. Ahora el campo ocupa casi todo el
           alto disponible y el ancho proporcional 3:2, con banquillo
           lateral reducido a 140px. */
        @media (orientation: landscape) and (max-width: 950px) {
            /* Body debe respetar el viewport (sin overflow) */
            body {
                height: 100vh;
                height: 100dvh;
                min-height: 0;
                overflow: hidden;
            }
            #live-main {
                flex-direction: row;
                flex: 1;
                min-height: 0;
                overflow: hidden;
            }
            #field-wrap {
                flex: 1;
                padding: 0.3rem;
                align-items: center;
                justify-content: center;
                min-height: 0;
                overflow: hidden;
            }
            #live-pitch {
                /* El campo ocupa toda la altura disponible del field-wrap,
                   y el ancho se deriva del aspect-ratio 3:2. Si el ancho
                   excede el 100% del padre, se limita con max-width. */
                height: 100%;
                width: auto;
                max-width: 100%;
                max-height: 100%;
                aspect-ratio: 3 / 2;
                flex-shrink: 0;
            }
            #bench-panel {
                width: 140px;
                flex-shrink: 0;
                padding: 0.4rem;
                overflow-y: auto;
            }
            .bench-player-row {
                padding: 0.3rem 0.4rem;
                gap: 0.35rem;
                margin-bottom: 3px;
            }
            .bench-dot { width: 18px; height: 18px; font-size: 0.55rem; }
            .bench-name { font-size: 0.65rem; }
            .bench-num  { font-size: 0.55rem; }
            .bench-time { font-size: 0.55rem; padding: 1px 4px; }
            .bench-section-title { font-size: 0.58rem; margin-top: 0.5rem; margin-bottom: 0.3rem; }

            /* Fichas aún más pequeñas para evitar amontonamiento en landscape móvil */
            .live-player-chip { width: 26px; height: 26px; font-size: 0.55rem; border-width: 1.5px; }
            .live-player-label { font-size: 0.45rem; max-width: 32px; padding: 0px 2px; }
            .live-player-time { font-size: 0.42rem; padding: 0px 2px; }

            #live-header {
                padding: 0.2rem 0.4rem;
                min-height: 0;
                gap: 0.3rem;
                flex-wrap: nowrap;
                overflow: hidden;
            }
            /* Header más compacto: ocultar botones no esenciales en landscape móvil */
            #live-header > div:last-child > button:not(#btn-mute):not([onclick*="doSignOut"]) {
                display: none;
            }
            #live-header .logo img { height: 36px !important; }
            #live-header #live-badge { font-size: 0.6rem; }
            #live-header #last-update { font-size: 0.55rem; }
            #live-header button { font-size: 0.6rem !important; padding: 0.2rem 0.4rem !important; }

            /* Scoreboard compacto en landscape móvil para liberar espacio
               vertical para el campo. */
            #scoreboard {
                padding: 0.15rem 0.5rem;
                gap: 0.8rem;
            }
            .team-score-name { font-size: 0.55rem; margin-bottom: 0; }
            .team-score-num  { font-size: 1.2rem; }
            .score-sep       { font-size: 1rem; }
            #live-timer      { font-size: 1rem; }
            .match-meta      { gap: 0.1rem; flex-direction: row; align-items: center; }
            #live-phase      { font-size: 0.5rem; }
            #live-mode       { font-size: 0.5rem; }
        }

        /* ── PORTRAIT MÓVIL: campo arriba + banquillo en franja inferior
                                 con scroll horizontal ──
           Antes: #bench-panel { display: none } ocultaba los suplentes
           por completo en portrait. Ahora el banquillo es una franja
           inferior siempre visible con scroll horizontal nativo.

           Estructura DOM:
              #bench-panel
                ├ .bench-section-title (LOCAL)
                ├ #bench-home  → contiene .bench-player-row
                ├ .bench-section-title (VISITANTE)
                └ #bench-away  → contiene .bench-player-row
        */
        @media (orientation: portrait) and (max-width: 600px) {
            /* Body debe respetar el viewport (sin overflow) */
            body {

                align-items: center;

            #live-pitch {
                /* Campo vertical que ocupa TODO el ancho disponible.
                   Antes: height:100% + width:auto dejaba el campo estrecho.

                   limitada por max-height: 100% para no desbordar el field-wrap. */
                width: 100%;

                height: auto;
                max-height: 100%;
                aspect-ratio: 2/3;
                flex-shrink: 1;
                min-height: 0;

            .live-player-label { font-size: 0.45rem; max-width: 34px; padding: 0px 2px; }
            .live-player-time { font-size: 0.42rem; padding: 0px 2px; }

                position: fixed;

                flex-wrap: nowrap;
                align-items: stretch;
                gap: 6px;
                overflow-x: auto;
                overflow-y: hidden;
                -webkit-overflow-scrolling: touch;
                scrollbar-width: thin;

                overscroll-behavior-x: contain;

            #bench-panel > .bench-section-title {

<script type="module">

let currentMatchId   = null;
let unsubscribeMatch = null;
let timerInterval    = null;
let lastSnapshot     = null;
let localTimerSecs   = 0;

// ── Read match ID from URL ─────────────────────────────────────────
const urlParams     = new URLSearchParams(location.search);
const urlMatchId    = urlParams.get('match');
window._saClubFilter = ''; // Filter for superadmin ('all' or clubId)

// ── Auth ──────────────────────────────────────────────────────────
window.doLiveAuth = async () => {
    const email    = document.getElementById('live-email').value.trim();
    const password = document.getElementById('live-password').value;

window.backToMatch = function() {

// Mostrar botón ← MI PARTIDO si venimos desde la app

// Cancela TODOS los listeners de fondo y detiene el polling de la lista.
// Idempotente: seguro llamarla varias veces.
function teardownBackgroundWatch() {
    if (typeof _bgPollTimer !== "undefined" && _bgPollTimer) { clearInterval(_bgPollTimer); _bgPollTimer = null; }
    if (typeof _stopAutonomousPhaseWatch === "function") _stopAutonomousPhaseWatch();
    if (typeof _bgWatchers !== "undefined") {
        Object.keys(_bgWatchers).forEach(id => {
            try { _bgWatchers[id](); } catch(e) {}
            delete _bgWatchers[id];
            delete _matchPrevState[id];
            delete _matchSeeded[id];
            delete _matchLastTs[id];
            delete _matchPrevPhase[id];
            delete _matchLastData[id];
        });
    }
}

window.doSignOut = async () => {
    if (unsubscribeMatch) unsubscribeMatch();
    clearInterval(timerInterval); timerInterval = null;
    teardownBackgroundWatch();
    await signOut(auth);
    location.reload();
};

let userData = null;

// ════════════════════════════════════════════════════════════════
//  ALERTAS DE EVENTO (gol · tarjeta · cambio · lesión)
//  Detecta cambios comparando snapshots consecutivos por jugador.
// ════════════════════════════════════════════════════════════════
let _alertsMuted = (localStorage.getItem("cronos_live_muted") === "1");
let _audioCtx = null;
// Estado anterior por matchId: { players:{id->{goals,cards,injured,status}}, home, away }
const _matchPrevState = {};
// Para no avisar de eventos ya existentes la primera vez que vemos un partido.
const _matchSeeded = {};
// Ultimo updatedAt (epoch ms) PROCESADO por matchId. Sirve para descartar
// snapshots no monotonicos (reenvios de Firestore tras reconexion o emisiones
// desde cache local desactualizada), que de otro modo re-dispararian alertas
// ya mostradas.
const _matchLastTs = {};
// Fase EFECTIVA anterior por matchId (1st_half|break|2nd_half|finished). Igual
// que _matchSeeded, se SIEMBRA sin disparar la primera vez; es COMPARTIDA entre
// el listener visible y el watcher de fondo, por lo que NO se borra en loadMatch
// (solo al cancelar el watcher de un partido terminado).
const _matchPrevPhase = {};
// Ultimo snapshot autoritativo cacheado por matchId. Lo usa _autonomousPhaseTick
// para reevaluar la fase derivada del reloj cuando el entrenador ha cerrado la
// app (sin emitir snapshots).
const _matchLastData = {};

window.toggleMute = function() {
    _alertsMuted = !_alertsMuted;
    localStorage.setItem("cronos_live_muted", _alertsMuted ? "1" : "0");
    const btn = document.getElementById("btn-mute");
    if (btn) { btn.textContent = _alertsMuted ? "🔕" : "🔔"; btn.classList.toggle("muted", _alertsMuted); btn.title = _alertsMuted ? "Activar alertas" : "Silenciar alertas"; }
    if (!_alertsMuted) unlockAudio(); else _stopKeepAlive();
};

// Boton explicito de "Activar sonido". En iPhone con la PWA en pantalla de
// inicio (standalone), live.html es un documento separado abierto con
// window.open(_blank): NO hereda el gesto del usuario de la pagina padre, y su
// AudioContext arranca 'suspended'. Como las alertas llegan por Firestore (sin
// gesto), el sonido no se desbloqueaba nunca. Este boton da un gesto GARANTIZADO
// dentro de este documento: desbloquea el audio y arranca el keep-alive. Tras
// desbloquear, se reproduce un bip de confirmacion y el boton pasa a "Sonido
// activo". En PC/iPad ya funcionaba; esto cubre el caso iPhone standalone.
window.activateSound = function() {
    unlockAudio();                       // crea/resume AudioContext + keep-alive (gesto)
    // Bip corto AUDIBLE de confirmacion (dentro del mismo gesto).
    try {
        if (_audioCtx && _audioCtx.state !== "running") _audioCtx.resume();
        if (_audioCtx) {
            const o = _audioCtx.createOscillator();
            const g = _audioCtx.createGain();
            o.type = "sine"; o.frequency.value = 880;
            const n = _audioCtx.currentTime;
            g.gain.setValueAtTime(0.0001, n);
            g.gain.exponentialRampToValueAtTime(0.2, n + 0.02);
            g.gain.exponentialRampToValueAtTime(0.0001, n + 0.25);
            o.connect(g); g.connect(_audioCtx.destination);
            o.start(n); o.stop(n + 0.27);
        }
    } catch(e) {}
    _refreshSoundBtn();
};

// Refresca el estado visual del boton de activar sonido segun el AudioContext.
function _refreshSoundBtn() {
    const btn = document.getElementById("btn-activate-sound");
    if (!btn) return;
    const running = !!(_audioCtx && _audioCtx.state === "running");
    if (running) {
        btn.textContent = "🔊 Sonido activo";
        btn.classList.add("ready");
        btn.title = "El sonido de alertas esta activo en este dispositivo";
    } else {
        btn.textContent = "🔊 Activar sonido";
        btn.classList.remove("ready");
        btn.title = "Toca para activar el sonido de alertas en este dispositivo";
    }
}

function _initMuteBtn() {
    const btn = document.getElementById("btn-mute");
    if (!btn) return;
    btn.textContent = _alertsMuted ? "🔕" : "🔔";
    btn.classList.toggle("muted", _alertsMuted);
    btn.title = _alertsMuted ? "Activar alertas" : "Silenciar alertas";
}

// El audio del navegador requiere un gesto del usuario. El login (clic) ya
// cuenta como gesto, pero re-desbloqueamos en el primer toque por seguridad.
function unlockAudio() {
    try {
        if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (_audioCtx.state === "suspended") _audioCtx.resume();
        // "Silent unlock": un buffer mudo arrancado de forma sincrona dentro del
        // gesto. Es lo unico que iOS acepta como desbloqueo real del audio.
        const buf = _audioCtx.createBuffer(1, 1, 22050);
        const src = _audioCtx.createBufferSource();
        src.buffer = buf;
        src.connect(_audioCtx.destination);
        src.start(0);
        // KEEP-ALIVE (clave para iPhone PWA standalone): tras el primer gesto
        // mantenemos el AudioContext permanentemente 'running' con un loop de
        // silencio inaudible. En iPhone instalado en pantalla de inicio, iOS
        // suspende el contexto entre gestos y NO permite resume() fuera de un
        // gesto; cuando la alerta llega por Firestore (sin gesto) el sonido no
        // sonaba ni una vez. Con el hardware de audio activo de forma continua,
        // el contexto sigue 'running' y _playSeq programa y suena sin gesto.
        _startKeepAlive();
    } catch(e) { /* sin audio disponible */ }
}

// Loop de silencio permanente que evita que iOS suspenda el AudioContext.
let _keepAliveSrc = null;
function _startKeepAlive() {
    try {
        if (!_audioCtx || _alertsMuted) return;
        if (_keepAliveSrc) return;                 // ya activo
        // Buffer de ~0.5 s de silencio, en bucle, a volumen 0.
        const frames = Math.floor(_audioCtx.sampleRate * 0.5);
        const buf = _audioCtx.createBuffer(1, frames, _audioCtx.sampleRate);
        const src = _audioCtx.createBufferSource();
        src.buffer = buf;
        src.loop = true;
        const g = _audioCtx.createGain();
        g.gain.value = 0;                           // inaudible
        src.connect(g); g.connect(_audioCtx.destination);
        src.start(0);
        _keepAliveSrc = src;
    } catch(e) { /* ignorar */ }
}
function _stopKeepAlive() {
    try { if (_keepAliveSrc) { _keepAliveSrc.stop(); _keepAliveSrc.disconnect(); } } catch(e){}
    _keepAliveSrc = null;
}
// iOS no dispara 'pointerdown' de forma fiable como gesto de audio: anadimos
// touchend y click. {once:false} para re-desbloquear tras cada interaccion.
["pointerdown", "touchend", "click"].forEach(ev =>
    document.addEventListener(ev, unlockAudio, { once: false, passive: true })
);
// iOS suspende el AudioContext en segundo plano / pantalla bloqueada. Al volver
// a primer plano reanudamos y reactivamos el keep-alive (el resume aqui no esta
// dentro de un gesto, pero en muchos casos basta; el siguiente toque lo asegura).
document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "visible" && _audioCtx) {
        if (_audioCtx.state === "suspended") _audioCtx.resume().catch(() => {});
        // El loop pudo detenerse al suspender; lo recreamos.
        _stopKeepAlive();
        _startKeepAlive();
    }

// navegacion y cierre; el navegador igualmente cierra los canales onSnapshot al
// destruir el contexto, pero esto los suelta de forma explicita y temprana.
window.addEventListener("pagehide", teardownBackgroundWatch);

// Sonidos sintéticos por tipo (sin archivos externos).
function playEventSound(type) {
    if (_alertsMuted) return;
    unlockAudio();
    if (!_audioCtx) return;
    const ctx = _audioCtx;
    // El contexto puede estar 'suspended' si esta llamada NO viene de un gesto
    // del usuario (p.ej. desde el callback de Firestore -> detectAndAlert). Si
    // leemos currentTime con el contexto suspendido, queda congelado y las 3
    // repeticiones se programan casi en el mismo instante -> al reanudar el
    // reloj salta y se colapsan en un solo golpe (se oye "una vez y corta").
    // Por eso SOLO programamos cuando el contexto esta 'running', releyendo
    // currentTime ya valido dentro del then() de resume().
    if (ctx.state === "running") {
        _playSeq(ctx, type);
    } else {
        ctx.resume().then(function(){ _playSeq(ctx, type); }).catch(function(){ /* sin audio */ });
    }
}

// Programa las 3 repeticiones de la secuencia leyendo currentTime en el momento
// (con el contexto ya 'running', para que los tiempos no esten congelados).
function _playSeq(ctx, type) {
    const now = ctx.currentTime;
    // [frecuencia(Hz), inicio(s), duracion(s)]
    // Secuencia CORTA original (melodia reconocible de cada evento). En lugar de
    // alargar cada nota (que sonaba a golpe + silencio por el decay exponencial),
    // repetimos la secuencia completa 3 veces (mas abajo) manteniendo su melodia.
    // Cada nota usa envolvente sostenida (sin huecos internos).
    const SEQ = {
        goal:   [[660,0,0.12],[880,0.12,0.12],[1175,0.24,0.22]],   // fanfarria ascendente
        yellow: [[520,0,0.18]],                                     // pitido medio
        red:    [[400,0,0.18],[300,0.20,0.30]],                    // doble grave
        sub:    [[700,0,0.10],[900,0.12,0.12]],                    // dos notas suaves
        injury: [[300,0,0.25],[260,0.27,0.35]]                     // tono descendente
    };
    const seq = SEQ[type] || SEQ.sub;
    const REPS = 3;                                     // 3 repeticiones fijas
    const GAP  = 0.06;                                  // pausa entre repeticiones
    // Duracion de una pasada = fin de su ultima nota.
    const seqDur = Math.max.apply(null, seq.map(function(n){ return n[1] + n[2]; }));
    const step   = seqDur + GAP;
    for (let r = 0; r < REPS; r++) {
        const base = r * step;
        seq.forEach(([freq, start, dur]) => {
            const osc  = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = (type === "goal") ? "triangle" : "sine";
            osc.frequency.value = freq;
            const t0  = now + base + start;
            const atk = 0.012;                            // ataque
            const rel = Math.min(0.05, dur * 0.35);       // release corto al final
            const sus = t0 + Math.max(atk, dur - rel);
            gain.gain.setValueAtTime(0.0001, t0);
            gain.gain.exponentialRampToValueAtTime(0.22, t0 + atk);   // ataque
            gain.gain.setValueAtTime(0.22, sus);                      // sostenido pleno
            gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur); // release corto
            osc.connect(gain); gain.connect(ctx.destination);
            osc.start(t0); osc.stop(t0 + dur + 0.02);
        });
    }
}

// Vibración en móvil (si está disponible).
function vibrate(pattern) { try { if (navigator.vibrate) navigator.vibrate(pattern); } catch(e){} }

const EVENT_META = {
    goal:   { icon: "⚽", cls: "ev-goal",   title: "¡GOL!",        flash: "rgba(63,185,80,0.22)",  vib: [120,60,120] },
    yellow: { icon: "🟨", cls: "ev-yellow", title: "Tarjeta amarilla", flash: "rgba(227,179,65,0.20)", vib: [200] },
    red:    { icon: "🟥", cls: "ev-red",    title: "Tarjeta roja",  flash: "rgba(218,54,51,0.22)",  vib: [300,80,300] },
    sub:    { icon: "🔄", cls: "ev-sub",    title: "Cambio",        flash: "rgba(88,166,255,0.18)", vib: [100] },
    injury: { icon: "🚑", cls: "ev-injury", title: "Lesión",        flash: "rgba(231,76,60,0.20)",  vib: [250,100,250] }
};

function showEventToast(type, line, sub) {
    const meta  = EVENT_META[type] || EVENT_META.sub;
    const stack = document.getElementById("event-toast-stack");
    if (!stack) return;
    const el = document.createElement("div");
    el.className = "event-toast " + meta.cls;
    el.innerHTML = 
        '<div class="et-icon">' + meta.icon + '</div>' +
        '<div class="et-body">' +
            '<div class="et-title">' + escapeHtml(line || meta.title) + '</div>' +
            (sub ? '<div class="et-sub">' + escapeHtml(sub) + '</div>' : "") +
        '</div>';
    const remove = () => {
        el.classList.add("leaving");
        setTimeout(() => el.remove(), 320);
    };
    el.onclick = remove;
    stack.appendChild(el);
    // Limitar a 5 toasts simultáneos
    while (stack.children.length > 5) stack.firstChild.remove();
    setTimeout(remove, 6500);

    // Flash de pantalla
    const flash = document.getElementById("event-flash");
    if (flash) {
        flash.style.background = "radial-gradient(circle at 50% 30%, " + meta.flash + ", transparent 70%)";
        flash.classList.remove("fire"); void flash.offsetWidth; flash.classList.add("fire");
    }
    playEventSound(type);
    if (!_alertsMuted) vibrate(meta.vib);
}

// ════════════════════════════════════════════════════════════════
//  SILBATO + OVERLAY DE MOMENTO DEL PARTIDO (fin de parte / fin de partido)
//  Réplica para espectadores de _cronosWhistle / _cronosMatchMomentOverlay
//  del entrenador (js/core/event-listeners.js, js/match/persistence/active-match.js).
//  Diferencias clave de live.html:
//   · El silbato se sintetiza SOBRE el _audioCtx compartido (keep-alive), NUNCA
//     creando un AudioContext propio (eso rompe en iOS PWA standalone).
//   · El overlay visual SIEMPRE se muestra (incluso con _alertsMuted); solo el
//     silbato se salta si está silenciado, igual que playEventSound/_playSeq.
//   · Cola FIFO para que dos transiciones casi simultáneas (p.ej. dos partidos
//     en fondo) no se pisen: se muestran una tras otra.
// ════════════════════════════════════════════════════════════════

// Silbato del árbitro sobre el _audioCtx compartido. times: 2 (fin 1ª parte),
// 3 (fin de partido). Respeta _alertsMuted (silencio → no suena). No bloquea:
// el overlay no espera al silbato (a diferencia del flujo del entrenador, aquí
// el overlay se encola por separado).
function _liveWhistle(times) {
    if (_alertsMuted) return;                 // silencio: sin pitido (overlay sí)
    unlockAudio();                            // asegura _audioCtx running (best-effort)
    const ctx = _audioCtx;
    if (!ctx) return;
    const fire = () => {
        try {
            const whistleDuration = 1.1;      // segundos por pitido
            const gapDuration     = 0.35;     // silencio entre pitidos
            let t = ctx.currentTime + 0.05;
            for (let i = 0; i < times; i++) {
                const osc    = ctx.createOscillator();
                const gainEnv = ctx.createGain();
                const noise  = ctx.createOscillator();
                const noiseG = ctx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(3100, t);
                osc.frequency.setValueAtTime(3200, t + 0.05);
                osc.frequency.setValueAtTime(3050, t + 0.10);
                osc.frequency.setValueAtTime(3200, t + 0.15);
                osc.frequency.setValueAtTime(3050, t + 0.20);
                osc.frequency.setValueAtTime(3150, t + 0.25);
                osc.frequency.setValueAtTime(3000, t + 0.30);
                osc.frequency.setValueAtTime(3150, t + 0.35);
                osc.frequency.setValueAtTime(3000, t + 0.40);
                gainEnv.gain.setValueAtTime(0, t);
                gainEnv.gain.linearRampToValueAtTime(0.55, t + 0.04);
                gainEnv.gain.setValueAtTime(0.55, t + whistleDuration - 0.15);
                gainEnv.gain.linearRampToValueAtTime(0, t + whistleDuration);
                noise.type = 'square';
                noise.frequency.setValueAtTime(6200, t);
                noiseG.gain.setValueAtTime(0.08, t);
                noiseG.gain.linearRampToValueAtTime(0, t + whistleDuration);
                osc.connect(gainEnv);  noise.connect(noiseG);
                gainEnv.connect(ctx.destination);  noiseG.connect(ctx.destination);
                osc.start(t);   osc.stop(t + whistleDuration);
                noise.start(t); noise.stop(t + whistleDuration);
                t += whistleDuration + gapDuration;
            }
        } catch (e) { /* sin audio */ }
    };
    // Mismo patrón que playEventSound: si el contexto no está 'running' (alerta
    // sin gesto), reanudar y programar dentro del then() para no congelar el reloj.
    if (ctx.state === "running") fire();
    else ctx.resume().then(fire).catch(function(){ /* sin audio */ });
}

// ── Cola FIFO de overlays de momento ───────────────────────────────
// Si llega una transición mientras otra está visible, se encola y se muestra al
// cerrarse la anterior. _momentActive evita solapes; _momentQueue conserva orden.
const _momentQueue = [];
let _momentActive = false;

// Encola un overlay. opts: { icon, title, subtitle, matchId, navigable }
// Si navigable===true y matchId !== currentMatchId, el overlay añade un botón
// "Ver partido" que navega vía loadMatch(matchId). Para el partido ya abierto
// (currentMatchId) el overlay solo cierra, sin botón extra.
function _enqueueMoment(opts) {
    _momentQueue.push(opts);
    _drainMomentQueue();
}

function _drainMomentQueue() {
    if (_momentActive) return;
    const opts = _momentQueue.shift();
    if (!opts) return;
    _momentActive = true;
    _showMomentOverlay(opts, () => {
        _momentActive = false;
        _drainMomentQueue();
    });
}

function _showMomentOverlay(opts, onDone) {
    const existing = document.getElementById('live-moment-overlay');
    if (existing) existing.remove();

    const navigable = !!opts.navigable && opts.matchId && opts.matchId !== currentMatchId;

    const overlay = document.createElement('div');
    overlay.id = 'live-moment-overlay';
    overlay.style.cssText = [
        'position:fixed', 'inset:0', 'z-index:999999',
        'display:flex', 'flex-direction:column',
        'align-items:center', 'justify-content:center', 'gap:1rem',
        'background:rgba(10,14,20,0.96)',
        'backdrop-filter:blur(8px)',
        'animation:_lmFadeIn 0.3s ease',
        'cursor:pointer'
    ].join(';');

    const btnHtml = navigable
        ? '<button id="live-moment-go" style="margin-top:1.2rem;padding:0.7rem 1.6rem;' +
          'background:#ff5858;border:none;border-radius:10px;color:#fff;font-weight:800;' +
          'font-size:0.95rem;letter-spacing:0.5px;cursor:pointer;">🔴 Ver partido</button>'
        : '';

    overlay.innerHTML =
        '<style>' +
        '@keyframes _lmFadeIn  { from { opacity:0; transform:scale(0.92) } to { opacity:1; transform:scale(1) } }' +
        '@keyframes _lmFadeOut { from { opacity:1; transform:scale(1)    } to { opacity:0; transform:scale(1.05) } }' +
        '@keyframes _lmBounce  { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }' +
        '@keyframes _lmPulse   { 0%,100%{opacity:1} 50%{opacity:0.6} }' +
        '</style>' +
        '<div style="font-size:5.5rem;animation:_lmBounce 0.8s ease infinite;line-height:1;">' + opts.icon + '</div>' +
        '<div style="font-size:2.2rem;font-weight:900;letter-spacing:3px;color:#ffffff;' +
        'text-align:center;text-transform:uppercase;text-shadow:0 0 30px rgba(255,255,255,0.4);' +
        'font-family:\'Inter\',system-ui,sans-serif;">' + escapeHtml(opts.title) + '</div>' +
        '<div style="font-size:1rem;font-weight:600;color:rgba(255,255,255,0.55);' +
        'letter-spacing:1.5px;text-transform:uppercase;text-align:center;">' + escapeHtml(opts.subtitle || '') + '</div>' +
        btnHtml +
        '<div style="margin-top:1.5rem;font-size:0.75rem;color:rgba(255,255,255,0.25);' +
        'animation:_lmPulse 1.2s ease infinite;">Toca para continuar</div>';

    document.body.appendChild(overlay);

    let dismissed = false;
    const dismiss = (cb) => {
        if (dismissed) return;
        dismissed = true;
        clearTimeout(autoTimer);
        overlay.style.animation = '_lmFadeOut 0.4s ease forwards';
        setTimeout(() => {
            if (overlay.parentNode) overlay.remove();
            if (typeof cb === 'function') cb();
            if (typeof onDone === 'function') onDone();
        }, 400);
    };

    // Click en el fondo cierra; el botón "Ver partido" navega tras cerrar.
    overlay.addEventListener('click', () => dismiss());
    if (navigable) {
        const goBtn = overlay.querySelector('#live-moment-go');
        if (goBtn) goBtn.addEventListener('click', (ev) => {
            ev.stopPropagation();
            const mid = opts.matchId;
            dismiss(() => {
                history.pushState({}, '', '?match=' + mid);
                loadMatch(mid);
            });
        });
    }
    const autoTimer = setTimeout(() => dismiss(), 4000); // Auto-cierra a los 4s
}

// ── Inferencia de fase EFECTIVA ────────────────────────────────────
// Centraliza la lógica de qué fase está REALMENTE en curso para un snapshot,
// incluyendo el modo autónomo: si el entrenador cerró la app, el reloj absoluto
// (phaseStartedAt) puede haber agotado la parte sin que él marque la transición.
// En ese caso la fase efectiva pasa a 'break' (1ª parte agotada) o 'finished'
// (2ª parte agotada). Devuelve uno de: 1st_half | break | 2nd_half | finished.
function _effectivePhase(matchData) {
    if (!matchData) return null;
    // Fin de partido autoritativo del servidor (status no activo).
    if (matchData.status && matchData.status !== "active") return "finished";
    let phase = matchData.phase || "1st_half";
    if (phase === "halftime") phase = "break";
    if (phase === "finished") return "finished";
    if (phase === "break") return "break";
    // 1ª/2ª parte: comprobar agotamiento autónomo por reloj absoluto.
    if (matchData.isRunning && matchData.phaseStartedAt && (phase === "1st_half" || phase === "2nd_half")) {
        const startedMs = (typeof matchData.phaseStartedAt.toMillis === 'function')
            ? matchData.phaseStartedAt.toMillis()
            : (typeof matchData.phaseStartedAt.toDate === 'function')
                ? matchData.phaseStartedAt.toDate().getTime()
                : Number(matchData.phaseStartedAt);
        if (startedMs > 0) {
            const defaultMaxTime = matchData.mode === 'f7' ? 30 * 60 : 40 * 60;
            const maxTime = phase === '2nd_half'
                ? (matchData.half2MaxTime || defaultMaxTime)
                : (matchData.half1MaxTime || defaultMaxTime);
            const maxAddedSecs = (matchData.mode === 'f7') ? 600 : 900;
            const phaseLimit = maxTime + maxAddedSecs;
            const elapsed = Math.max(0, Math.floor((Date.now() - startedMs) / 1000));
            if (elapsed >= phaseLimit) return (phase === '2nd_half') ? "finished" : "break";
        }
    }
    return phase;
}

// ── Punto ÚNICO de decisión de transición de fase ──────────────────
// Invocado desde: (1) el listener visible, (2) el watcher de fondo, (3) el timer
// autónomo _autonomousPhaseTick. Compara la fase efectiva nueva con la anterior
// (_matchPrevPhase) y, en las transiciones relevantes, dispara silbato + overlay.
// SIEMBRA sin disparar la primera vez que ve un partido (igual que _matchSeeded).
// matchData es opcional para fin autónomo derivado solo del cacheado.
function _handlePhaseTransition(matchId, matchData) {
    const data = matchData || _matchLastData[matchId];
    if (!data) return;
    if (matchData) _matchLastData[matchId] = matchData;

    const nextPhase = _effectivePhase(data);
    if (nextPhase == null) return;
    const prevPhase = _matchPrevPhase[matchId];

    // Primera vez: sembrar SIN disparar (no avisar del estado preexistente).
    if (prevPhase === undefined) { _matchPrevPhase[matchId] = nextPhase; return; }
    if (nextPhase === prevPhase) return;
    _matchPrevPhase[matchId] = nextPhase;

    // ¿Es el partido que el usuario está viendo ahora? El partido abierto no lleva
    // botón "Ver partido"; los de fondo sí (equipos + marcador + navegación).
    const isCurrent  = (matchId === currentMatchId);
    const homeName   = data.homeTeam?.name || "Local";
    const awayName   = data.awayTeam?.name || "Visitante";
    const homeScore  = data.homeTeam?.score ?? 0;
    const awayScore  = data.awayTeam?.score ?? 0;
    const scoreLine  = homeName + " " + homeScore + " · " + awayScore + " " + awayName;

    // Transición a DESCANSO (fin de 1ª parte): desde 1ª parte.
    if (nextPhase === "break" && prevPhase === "1st_half") {
        _liveWhistle(2);
        _enqueueMoment({
            icon: '🏁',
            title: 'FINAL DE PRIMERA PARTE',
            subtitle: isCurrent ? 'Descanso' : scoreLine,
            matchId: matchId,
            navigable: !isCurrent
        });
        return;
    }
    // Transición a FIN DE PARTIDO: desde cualquier fase de juego.
    if (nextPhase === "finished" && (prevPhase === "1st_half" || prevPhase === "2nd_half" || prevPhase === "break")) {
        _liveWhistle(3);
        _enqueueMoment({
            icon: '🤝',
            title: 'FINAL DEL PARTIDO',
            subtitle: isCurrent ? 'El árbitro ha pitado el final' : scoreLine,
            matchId: matchId,
            navigable: !isCurrent
        });
        return;
    }
    // Otras transiciones (break → 2nd_half) no llevan silbato/overlay.
}

// ── Timer autónomo de transiciones ─────────────────────────────────
// Cuando el entrenador cierra la app, deja de emitir snapshots, así que ni el
// listener visible ni el watcher de fondo reciben el evento de agotamiento de la
// parte. Este timer reevalúa periódicamente la fase efectiva (derivada del reloj
// absoluto phaseStartedAt) de TODOS los partidos cacheados y dispara la
// transición a DESCANSO/FIN cuando el reloj la alcanza, aunque no llegue snapshot.
let _autonomousPhaseTimer = null;
function _autonomousPhaseTick() {
    Object.keys(_matchLastData).forEach(id => {
        _handlePhaseTransition(id, null);   // null → usa el snapshot cacheado
    });
}
function _startAutonomousPhaseWatch() {
    if (_autonomousPhaseTimer) return;
    _autonomousPhaseTimer = setInterval(_autonomousPhaseTick, 1000);
}
function _stopAutonomousPhaseWatch() {
    if (_autonomousPhaseTimer) { clearInterval(_autonomousPhaseTimer); _autonomousPhaseTimer = null; }
}

// Construye el mapa de estado por jugador a partir de un snapshot.
function _buildState(data) {
    const players = {};
    (data.players || []).forEach(p => {
        if (p.id == null) return;
        players[p.id] = {
            goals:   p.goals   || 0,
            cards:   p.cards   || "ninguna",
            injured: !!p.injured,
            status:  p.status,
            name:    p.name,
            number:  p.number,
            team:    p.team
        };
    });
    return {
        players,
        home: data.homeTeam?.score ?? 0,
        away: data.awayTeam?.score ?? 0
    };
}

// Compara el snapshot nuevo con el anterior y dispara alertas.
// matchId identifica el partido; matchData es el snapshot de Firestore.
function detectAndAlert(matchId, matchData, fromCache) {
    // Descartar snapshots de cache local desactualizada: cuando hay un cambio
    // pendiente de confirmar en el servidor, Firestore puede emitir primero un
    // snapshot fromCache que puede estar atrasado. No avisamos con datos de cache.
    if (fromCache) { return; }
    // Descartar snapshots no monotonicos: si este snapshot no es mas reciente
    // que el ultimo procesado para este partido, ignorarlo (evita re-disparar
    // alertas tras reconexiones o reenvios de Firestore).
    const ts = (typeof matchData.updatedAt?.toMillis === 'function')
        ? matchData.updatedAt.toMillis()
        : (typeof matchData.updatedAt?.toDate === 'function')
            ? matchData.updatedAt.toDate().getTime()
            : 0;
    const prevTs = _matchLastTs[matchId] || 0;
    if (ts && prevTs && ts <= prevTs) return;
    if (ts) _matchLastTs[matchId] = ts;

    // TRANSICIONES DE FASE (silbato + overlay). Se evalúa SIEMPRE, por ENCIMA del
    // guard `status !== "active"` de más abajo, porque el fin de partido implica
    // precisamente status='finished' y debe disparar el overlay de FIN DE PARTIDO.
    // _handlePhaseTransition cachea el snapshot en _matchLastData para el timer
    // autónomo y siembra/compara _matchPrevPhase con su propia lógica.
    _handlePhaseTransition(matchId, matchData);

    const next = _buildState(matchData);
    const prev = _matchPrevState[matchId];
    _matchPrevState[matchId] = next;

    // La primera vez que vemos un partido NO avisamos del estado preexistente.
    if (!prev || !_matchSeeded[matchId]) { _matchSeeded[matchId] = true; return; }
    if (matchData.status !== "active") return; // solo partidos en vivo

    const matchLabel = (matchData.homeTeam?.name || "Local") + " vs " + (matchData.awayTeam?.name || "Visitante");
    const subPending = []; // jugadores que pasaron a banquillo (posible "sale")
    const subIn      = []; // jugadores que entraron al campo
    // Goles ya atribuidos a un jugador concreto en ESTE recorrido, por equipo.
    // Sirve para restar del delta del marcador agregado (home/away en el estado,
    // derivado de homeTeam.score / awayTeam.score) los goles que ya provocaron
    // su propio showEventToast, y así NO duplicar la alerta cuando el gol SÍ es
    // de un jugador con plantilla. El resto del delta no explicado por jugadores
    // son goles "sin jugador" (equipo rival sin plantilla, o gol no asignado /
    // propia puerta del equipo propio) que el bucle por jugador no detecta.
    let playerGoalsHome = 0;
    let playerGoalsAway = 0;

    Object.keys(next.players).forEach(id => {
        const np = next.players[id];
        const pp = prev.players[id];
        if (!pp) return;
        const who = "#" + (np.number ?? "?") + " " + (np.name || "Jugador");

        // GOL — los goles del jugador aumentaron
        if (np.goals > pp.goals) {
            const n = np.goals - pp.goals;
            if (np.team === "away") playerGoalsAway += n; else playerGoalsHome += n;
            showEventToast("goal", "¡GOL! " + who, matchLabel + (n > 1 ? " · +" + n : ""));
        }
        // TARJETAS — cambio de estado de tarjeta
        if (np.cards !== pp.cards) {
            if (np.cards === "amarilla" && pp.cards !== "amarilla")
                showEventToast("yellow", "Amarilla · " + who, matchLabel);
            else if (np.cards === "roja" && pp.cards !== "roja")
                showEventToast("red", "Roja · " + who, matchLabel);
        }
        // LESIÓN — pasó a lesionado
        if (np.injured && !pp.injured) {
            showEventToast("injury", "Lesión · " + who, matchLabel);
        }
        // CAMBIO — transiciones field<->bench (no por expulsión roja)
        if (np.status !== pp.status && np.cards !== "roja" && pp.cards !== "roja") {
            if (pp.status === "field" && np.status === "bench") subPending.push(who);
            else if (pp.status === "bench" && np.status === "field") subIn.push(who);
        }
    });

    // GOL SIN JUGADOR ASOCIADO — marcador agregado.
    // El bucle anterior solo detecta goles cuando el campo `goals` de un jugador
    // del array aumenta. Los goles registrados vía window._cronosExtraGoals
    // (equipo rival SIN plantilla cargada, o "gol no asignado / propia puerta"
    // del equipo propio) suben homeTeam.score / awayTeam.score en Firestore pero
    // NO incrementan el `goals` de ningún jugador, por lo que el bucle no los ve.
    // Aquí comparamos el delta REAL del marcador agregado (next.home/next.away,
    // derivado de homeTeam.score/awayTeam.score en _buildState) y restamos los
    // goles que YA fueron atribuidos a un jugador en este mismo ciclo
    // (playerGoalsHome / playerGoalsAway) para no duplicar la alerta del gol
    // propio. El remanente no explicado son goles sin jugador → una alerta por
    // cada uno, con el NOMBRE REAL del equipo configurado.
    const homeName = matchData.homeTeam?.name || "Local";
    const awayName = matchData.awayTeam?.name || "Visitante";
    const deltaHome = (next.home || 0) - (prev.home || 0);
    const deltaAway = (next.away || 0) - (prev.away || 0);
    // Solo deltas POSITIVOS no explicados por jugadores → goles. Un gol anulado
    // (delta negativo) o un marcador que no cambia no dispara nada. Si el delta
    // queda totalmente explicado por goles de jugador, el remanente es 0.
    const extraHome = Math.max(0, deltaHome - playerGoalsHome);
    const extraAway = Math.max(0, deltaAway - playerGoalsAway);
    for (let i = 0; i < extraHome; i++) {
        showEventToast("goal", "¡GOL! " + homeName, matchLabel);
    }
    for (let i = 0; i < extraAway; i++) {
        showEventToast("goal", "¡GOL! " + awayName, matchLabel);
    }

    // Sustituciones: emparejar entradas/salidas en un único aviso si es posible.
    if (subIn.length || subPending.length) {
        const pairs = Math.max(subIn.length, subPending.length);
        for (let i = 0; i < pairs; i++) {
            const inP  = subIn[i];
            const outP = subPending[i];
            let line = "Cambio";
            if (inP && outP) line = "Cambio · ▲ " + inP + "  ▼ " + outP;
            else if (inP)    line = "Entra · " + inP;
            else if (outP)   line = "Sale · " + outP;
            showEventToast("sub", line, matchLabel);
        }
    }
}


async function checkUserAccess(user) {
    const errEl = document.getElementById('auth-error');
    try {
        const snap = await getDoc(doc(db, 'users', user.uid));
        if (!snap.exists()) { errEl.textContent = 'Usuario no registrado.'; await signOut(auth); return; }
        userData = { uid: user.uid, ...snap.data() };
        if (!userData.isAuthorized) { errEl.textContent = 'Cuenta pendiente de autorización.'; await signOut(auth); return; }
        
        // Roles con acceso: superadmin, admin, club_admin, director, coordinator, user, parent
        const AUTHORIZED_ROLES = ['superadmin', 'admin', 'club_admin', 'director', 'coordinator', 'user', 'parent'];
        if (!AUTHORIZED_ROLES.includes(userData.role)) {
            errEl.textContent = 'No tienes permiso para ver partidos en vivo. Contacta con el administrador.';
            await signOut(auth); return;
        }
        
        // Access granted
        console.log("[LIVE] checkUserAccess: OK, role=" + userData.role);
        document.getElementById('auth-overlay').style.display = 'none';
        document.getElementById('live-header').style.display  = 'flex';

    }
}

// ── Vigilancia en segundo plano de TODOS los partidos seguidos ─────
// Suscribe un onSnapshot a cada partido en vivo que el usuario puede
// seguir, de modo que las alertas (gol/tarjeta/cambio/lesión) suenen
// en cualquier partido aunque el director esté viendo otro o la lista.
const _bgWatchers = {};   // matchId -> unsubscribe
let _bgPollTimer = null;

function _userCanFollow(m) {
    if (!m || m.status !== "active") return false;
    const isSA = (userData.role === "superadmin" || userData.role === "admin");
    if (isSA) {
        if (window._saClubFilter) return m.clubId === window._saClubFilter;
        return true;
    }
    if (userData.clubId && m.clubId === userData.clubId) return true;
    if (m.createdBy && m.createdBy === userData.uid) return true;
    if (m.coachEmail && userData.email && m.coachEmail.toLowerCase() === userData.email.toLowerCase()) return true;
    return false;
}

async function refreshBackgroundWatchers() {
    try {
        const snap = await getDocs(collection(db, "live_matches"));
        const activeIds = new Set();
        snap.forEach(d => {
            const m = { id: d.id, ...d.data() };
            if (!_userCanFollow(m)) return;
            activeIds.add(m.id);
            if (_bgWatchers[m.id]) return; // ya suscrito
            _bgWatchers[m.id] = onSnapshot(doc(db, "live_matches", m.id), (s2) => {
                if (!s2.exists()) return;
                const data = s2.data();
                // El partido que se esta viendo lo procesa EXCLUSIVAMENTE el
                // listener de loadMatch (via detectAndAlert -> renderMatch). El
                // watcher de fondo se desentiende por completo de ese partido para
                // no competir por _matchPrevState (evita falsos negativos por orden
                // de callbacks no determinista entre ambos listeners).
                if (m.id === currentMatchId) return;
                detectAndAlert(m.id, data, s2.metadata && s2.metadata.fromCache);
            }, () => {});
        });
        // Cancelar suscripciones de partidos que ya no están activos/seguidos.
        Object.keys(_bgWatchers).forEach(id => {
            if (!activeIds.has(id)) {
                try { _bgWatchers[id](); } catch(e){}
                delete _bgWatchers[id];
                delete _matchPrevState[id];
                delete _matchSeeded[id];
                delete _matchLastTs[id];
                delete _matchPrevPhase[id];
                delete _matchLastData[id];
            }
        });
    } catch(e) { console.warn("[LIVE] refreshBackgroundWatchers:", e.message); }
}

function startBackgroundWatch() {
    if (_bgPollTimer) return;
    refreshBackgroundWatchers();
    // Reevaluar la lista de partidos seguidos periódicamente (altas/bajas).
    _bgPollTimer = setInterval(refreshBackgroundWatchers, 30000);
    // Timer autónomo: dispara transiciones de fase por reloj absoluto aunque el
    // entrenador haya cerrado la app y dejen de llegar snapshots.
    _startAutonomousPhaseWatch();
}

// ── Enter live view ────────────────────────────────────────────────

    _initMuteBtn();

    startBackgroundWatch();
